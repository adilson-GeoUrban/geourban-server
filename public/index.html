<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban Control</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    color:#fff;

    background-image:url("/bg.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.60);
    z-index:-1;
}

.topo{
    background:#111;
    color:#FFD100;
    padding:18px;
    text-align:center;
    font-size:26px;
    font-weight:bold;
    border-bottom:3px solid #FFD100;
}

.painel{
    display:flex;
    min-height:calc(100vh - 65px);
}

.menu{
    width:230px;
    background:rgba(15,15,15,.92);
    padding:15px;
    border-right:2px solid #FFD100;
}

.menu button{

    width:100%;
    margin:8px 0;
    padding:12px;

    background:#FFD100;
    color:#000;

    border:none;
    border-radius:8px;

    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:.30s;
}

.menu button:hover{
    background:#ffe45c;
    transform:scale(1.02);
}

.conteudo{
    flex:1;
    padding:30px;
    font-size:18px;
}

.monitor{
    width:260px;
    background:rgba(15,15,15,.92);
    border-left:2px solid #FFD100;
    padding:15px;
}

.box{

    background:rgba(0,0,0,.45);

    border:1px solid #FFD100;

    border-radius:8px;

    padding:12px;

    margin-bottom:15px;

}

h3{
    color:#FFD100;
}

</style>

</head>

<body>

<div class="topo">
🚀 GEOURBAN CONTROLE TOTAL
</div>

<div class="painel">

<div class="menu">

<button onclick="login()">🔐 Login</button>

<button onclick="verLogs()">📄 Logs</button>

<button onclick="verIntel()">🧠 Inteligência</button>

</div>

<div class="conteudo" id="conteudo">

<h2>Bem-vindo ao GeoUrban</h2>

<p>Sistema carregado com sucesso.</p>

</div>

<div class="monitor">

<div class="box" id="sessao"></div>

<div class="box" id="status"></div>

<div class="box" id="risco"></div>

</div>

</div>

<script>

let token="";
let risco=0;

setInterval(()=>{

document.getElementById("sessao").innerHTML="🟢 Sessão ativa";

document.getElementById("status").innerHTML="Servidor: ONLINE";

document.getElementById("risco").innerHTML="Risco: "+risco;

},1000);


// LOGIN
async function login(){

const res = await fetch("/api/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:"admin@geourban.com.br",

senha:"1234"

})

});

const data=await res.json();

if(res.ok){

conteudo.innerHTML="<h2>✅ Login realizado</h2>";

}else{

conteudo.innerHTML="<h2>❌ "+data.message+"</h2>";

}

}


// LOGS
async function verLogs(){

conteudo.innerHTML="<h2>📄 Área de Logs</h2><p>Módulo em desenvolvimento.</p>";

}


// IA
async function verIntel(){

conteudo.innerHTML="<h2>🧠 Inteligência Artificial</h2><p>Módulo em desenvolvimento.</p>";

risco=0;

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoUrban</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("bg.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* 🔐 LOGIN */
.login-box {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 280px;
    background: rgba(0,0,0,0.85);
    padding: 20px;
    border-radius: 10px;
    color: white;
    z-index: 9999;
}

/* 🤖 IA */
#ia-bot {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 300px;
    z-index: 9999;
}

#ia-header {
    background: #2e7d32;
    color: white;
    padding: 10px;
    cursor: pointer;
    border-radius: 10px 10px 0 0;
}

#ia-body {
    background: rgba(0,0,0,0.9);
    height: 300px;
    display: none;
    flex-direction: column;
    padding: 10px;
}

#ia-mensagens {
    flex: 1;
    overflow-y: auto;
    color: white;
}

#ia-input {
    width: 100%;
    padding: 8px;
}

/* 🔲 OVERLAY */
#overlay-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 10000;
}

/* 💬 MODAL */
#modal-box {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #111;
    color: white;
    padding: 20px;
    border-radius: 10px;
    z-index: 10001;
    text-align: center;
    width: 280px;
}
</style>
</head>

<body>

<!-- 🔐 AVISO TOPO -->
<div style="position:fixed; top:10px; left:50%; transform:translateX(-50%);
background:#000; color:#fff; padding:8px 15px; font-size:12px; z-index:9999; border-radius:8px;">
🔐 Sistema protegido — LGPD
</div>

<!-- 🔐 LOGIN -->
<div class="login-box">
    <h3>GeoUrban 🔐</h3>

    <input id="cpf" placeholder="CPF"><br><br>
    <input id="senha" type="password" placeholder="Senha"><br><br>

    <button onclick="cadastrar()">Cadastrar</button>
    <button onclick="login()">Entrar</button>
</div>

<!-- 🤖 IA -->
<div id="ia-bot">
    <div id="ia-header" onclick="toggleIA()">🤖 Assistente</div>

    <div id="ia-body">
        <div id="ia-mensagens"></div>
        <input id="ia-input" placeholder="Digite..." onkeydown="if(event.key==='Enter') enviarIA()">
    </div>
</div>

<!-- 🔲 OVERLAY -->
<div id="overlay-modal"></div>

<!-- 💬 MODAL -->
<div id="modal-box">
    <div id="modal-msg"></div><br>
    <button onclick="fecharModal()">OK</button>
</div>

<!-- 🔐 RODAPÉ -->
<div style="position:fixed; bottom:0; width:100%; background:#000; color:#ccc;
text-align:center; font-size:11px; padding:6px; z-index:9999;">
🔐 Aviso LGPD — GeoUrban © 2026
</div>

<script>
// =============================
// 💬 MODAL
// =============================
function abrirModal(msg) {
    document.getElementById("modal-msg").innerText = msg;
    document.getElementById("overlay-modal").style.display = "block";
    document.getElementById("modal-box").style.display = "block";
}

function fecharModal() {
    document.getElementById("overlay-modal").style.display = "none";
    document.getElementById("modal-box").style.display = "none";
}

// =============================
// 🔐 LOGIN
// =============================
async function cadastrar() {
    const cpf = document.getElementById("cpf").value;
    const senha = document.getElementById("senha").value;

    try {
        const res = await fetch("/cadastro", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ cpf, senha })
        });

        const data = await res.json();
        abrirModal(data.ok ? "✅ Cadastro realizado" : data.erro);

    } catch {
        abrirModal("❌ Erro de conexão");
    }
}

async function login() {
    const cpf = document.getElementById("cpf").value;
    const senha = document.getElementById("senha").value;

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ cpf, senha })
        });

        const data = await res.json();
        abrirModal(data.ok ? "🔐 Login realizado" : "❌ Credenciais inválidas");

    } catch {
        abrirModal("❌ Erro de conexão");
    }
}

// =============================
// 🤖 IA
// =============================
function toggleIA() {
    const body = document.getElementById("ia-body");
    body.style.display = body.style.display === "flex" ? "none" : "flex";
}

function addMsg(texto) {
    const box = document.getElementById("ia-mensagens");
    box.innerHTML += "<div>" + texto + "</div>";
    box.scrollTop = box.scrollHeight;
}

function iniciarIA() {
    addMsg("👋 Bem-vindo ao GeoUrban.");
    setTimeout(() => {
        addMsg("Você possui alguma necessidade?");
        addMsg("👁️ Visual | 👂 Auditiva | ♿ Mobilidade | ❌ Nenhuma");
    }, 800);
}

function enviarIA() {
    const input = document.getElementById("ia-input");
    const texto = input.value;

    if (!texto) return;

    addMsg("🧑 " + texto);
    input.value = "";
}

window.onload = iniciarIA;
</script>

</body>
</html>

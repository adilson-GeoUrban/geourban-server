<div style="margin-top:20px;">
  <h3>🔐 Alterar Senha</h3>

  <input type="password" id="currentPass" placeholder="Senha atual" required>
  <input type="password" id="newPass" placeholder="Nova senha" required>

  <button onclick="alterarSenha()">Alterar Senha</button>

  <p id="msgSenha" style="margin-top:10px;"></p>
</div>

<script>
function alterarSenha() {
  const currentPass = document.getElementById("currentPass").value;
  const newPass = document.getElementById("newPass").value;
  const msg = document.getElementById("msgSenha");

  const token = localStorage.getItem("token");

  // 🔒 validações básicas
  if (!token) {
    msg.innerText = "Usuário não autenticado";
    msg.style.color = "red";
    return;
  }

  if (!currentPass || !newPass) {
    msg.innerText = "Preencha todos os campos";
    msg.style.color = "orange";
    return;
  }

  if (newPass.length < 6) {
    msg.innerText = "Nova senha deve ter no mínimo 6 caracteres";
    msg.style.color = "orange";
    return;
  }

  fetch("https://geourban-server-production.up.railway.app/change-password", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      currentPass: currentPass,
      newPass: newPass
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.message && data.message.includes("sucesso")) {
      msg.innerText = data.message;
      msg.style.color = "#00ff88";

      // 🧠 limpa campos
      document.getElementById("currentPass").value = "";
      document.getElementById("newPass").value = "";

    } else {
      msg.innerText = data.message || "Erro ao alterar senha";
      msg.style.color = "red";
    }

  })
  .catch(err => {
    console.error("[ERRO ALTERAR SENHA]", err);
    msg.innerText = "Erro ao conectar com servidor";
    msg.style.color = "red";
  });
}
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GeoUrban</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;

    /* ✅ FUNDO FUNCIONANDO */
    background: url("geo.jpg") no-repeat center center;
    background-size: cover;

    display: flex;
    align-items: center;
    justify-content: center;
}

/* ✅ CAIXA AJUSTADA (não bloqueia a imagem) */
.container {
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    color: white;
}

/* ✅ TEXTO */
h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

p {
    margin-bottom: 20px;
    opacity: 0.9;
}

/* ✅ BOTÃO */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: #00c853;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #00e676;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 GEOURBAN ONLINE</h1>
    <p>Sistema ativo e funcionando</p>

    <a href="/ia.html">
        <button>🤖 Abrir IA</button>
    </a>
</div>

</body>
</html>

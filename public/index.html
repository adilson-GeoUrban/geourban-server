<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GeoUrban V2</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #020617;
  position: fixed;
  padding: 20px;
}

.sidebar h2 {
  color: #38bdf8;
}

.sidebar a {
  display: block;
  color: #94a3b8;
  margin: 10px 0;
  text-decoration: none;
}

/* MAIN */
.main {
  margin-left: 240px;
  padding: 20px;
}

/* HEADER COM IMAGEM */
.header img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 12px;
}

/* CARDS */
.cards {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.card {
  flex: 1;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

/* IA BOX */
.ai-box {
  margin-top: 20px;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 100px;
  border-radius: 8px;
  border: none;
  padding: 10px;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🌍 GeoUrban</h2>
  <a href="#">Dashboard</a>
  <a href="#">Relatórios</a>
  <a href="#">Mapas</a>
  <a href="#">Configurações</a>
</div>

<div class="main">

  <div class="header">
    <img src="Inteligência urbana no futuro.jpg">
  </div>

  <h1>Dashboard Urbano Inteligente</h1>

  <div class="cards">
    <div class="card">130+ Relatórios</div>
    <div class="card">95% Precisão IA</div>
    <div class="card">27 Usuários</div>
  </div>

  <div class="ai-box">
    <h3>Análise com IA</h3>
    <textarea placeholder="Descreva seu problema urbano..."></textarea>
    <button>Analisar</button>
  </div>

</div>

</body>
</html>

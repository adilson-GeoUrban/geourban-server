<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Modo de Emergência Seguro</title>
</head>

<body>

<script>
// 🔐 1. CHAVE PRINCIPAL
const chave = prompt("Digite a chave de emergência:");

if (chave !== "GEOURBAN-2026") {
    alert("Chave inválida");
    window.location.href = "/login.html";
} else {

    // 🔢 2. GERAR CÓDIGO
    const codigo = Math.floor(100000 + Math.random() * 900000);
    console.log("Código de verificação:", codigo);

    alert("Código enviado (ver console F12)");

    // 🔎 3. VALIDAR CÓDIGO
    const entrada = prompt("Digite o código de verificação:");

    if (entrada == codigo) {

        // ✅ 4. LIBERAR ACESSO
        localStorage.setItem("auth", "true");
        localStorage.setItem("usuario", "admin");
        localStorage.setItem("descricao", "acesso emergencial seguro");
        localStorage.setItem("chave", "validado");

        alert("Acesso restaurado com segurança");

        window.location.href = "/sistema.html";

    } else {
        alert("Código incorreto");
        window.location.href = "/login.html";
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban Login</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.box {
  background: #222;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}
button {
  background: #00ff88;
  border: none;
  cursor: pointer;
  font-weight: bold;
}
#status {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>GeoUrban</h2>

  <input type="text" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <p id="status"></p>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!data.success) {
      document.getElementById("status").innerText = "❌ Credenciais inválidas";
      return;
    }

    document.getElementById("status").innerText = "✅ Login OK";

  } catch (err) {
    document.getElementById("status").innerText = "❌ Erro ao conectar servidor";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban</title>
</head>

<body style="background:#111;color:#0f0;font-family:Arial;text-align:center;padding-top:50px;">

<h1>🚀 GeoUrban ONLINE</h1>

<p id="status">Testando conexão...</p>

<script>
fetch('/teste')
.then(r => r.text())
.then(t => {
    document.getElementById("status").innerText = t;
})
.catch(() => {
    document.getElementById("status").innerText = "Erro ao conectar backend";
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0f1c;
    color:#fff;
}

.content{
    padding:20px;
}

.card{
    background:#1f2937;
    padding:20px;
    margin:10px;
    border-radius:10px;
    cursor:pointer;
    display:inline-block;
}

.panel{
    display:none;
}

.panel.active{
    display:block;
}

input, select{
    display:block;
    margin:10px 0;
    padding:8px;
    width:250px;
}

button{
    padding:10px;
    margin-top:10px;
}

#log{
    background:#000;
    margin-top:20px;
    padding:10px;
    height:120px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="content">

<h1>🚀 GeoUrban</h1>

<div id="home" class="panel active">
<div class="card" onclick="abrir('entrada')">🌐 Cadastro</div>
</div>

<div id="entrada" class="panel">

<button onclick="voltar()">⬅ Voltar</button>

<h2>Cadastro</h2>

<form onsubmit="salvarEntrada(event)">

<input placeholder="Nome" required>
<input placeholder="Email" required>

<select id="situacao" required>
<option value="">Situação</option>
<option value="ativo">Ativo</option>
<option value="autonomo">Autônomo</option>
<option value="aposentado">Aposentado</option>
</select>

<input id="registro" placeholder="Registro profissional">

<button type="submit">Cadastrar</button>

</form>

<div id="resposta"></div>

</div>

<div id="log"></div>

</div>

<script>

function abrir(id){
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function voltar(){
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('home').classList.add('active');
}

function salvarEntrada(e){
    e.preventDefault();

    const situacao = document.getElementById("situacao").value;
    const registro = document.getElementById("registro").value;

    if(situacao === "ativo" && registro.length < 3){
        alert("Registro obrigatório");
        return;
    }

    document.getElementById("resposta").innerHTML = "✅ OK";
    registrar("Cadastro feito");
}

let ultimo = "";

function registrar(msg){
    if(msg !== ultimo){
        document.getElementById("log").innerHTML += msg + "<br>";
        ultimo = msg;
    }
}

</script>

</body>
</html>

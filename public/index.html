<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0f1c;
    color:#fff;
}

.container{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    max-width:800px;
}

.full{ grid-column:1/3; }

input, select{
    padding:8px;
    width:100%;
}

button{
    padding:10px;
    margin-top:10px;
}

.card{
    margin-top:20px;
    background:#0b1a2a;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 GeoUrban Cadastro</h2>

<form class="grid" onsubmit="salvar(event)">

<input id="nome" placeholder="Nome completo" class="full" required>
<input id="email" placeholder="Email" class="full" required>

<select id="categoria">
<option value="">Categoria</option>
<option>Estudante</option>
<option>Profissional</option>
<option>Outro</option>
</select>

<select id="nivel">
<option value="">Nível</option>
<option>Técnico</option>
<option>Graduação</option>
<option>Pós</option>
<option>Mestrado</option>
<option>Doutorado</option>
</select>

<input id="profissao" placeholder="Profissão">
<input id="especializacao" placeholder="Especialização">

<select id="registroTipo">
<option value="">Registro</option>
<option>CREA</option>
<option>CAU</option>
<option>CFT</option>
<option>ART</option>
<option>RRT</option>
<option>TRT</option>
</select>

<input id="registroNumero" placeholder="Número do registro">

<input id="pais" placeholder="País">
<input id="regiao" placeholder="Região">

<select id="situacao" class="full">
<option value="">Situação</option>
<option>Ativo</option>
<option>Autônomo</option>
<option>Aposentado</option>
<option>Informal</option>
</select>

<button type="submit" class="full">Cadastrar</button>

</form>

<div id="resposta"></div>
<div id="cardUsuario"></div>

</div>

<script>

function salvar(e){
    e.preventDefault();

    const usuario = {
        nome: nome.value,
        email: email.value,
        categoria: categoria.value,
        nivel: nivel.value,
        profissao: profissao.value,
        especializacao: especializacao.value,
        registroTipo: registroTipo.value,
        registroNumero: registroNumero.value,
        pais: pais.value,
        regiao: regiao.value,
        situacao: situacao.value
    };

    // VALIDAÇÃO
    if(usuario.categoria === "Profissional"){
        if(!usuario.registroTipo || !usuario.registroNumero){
            alert("⚠️ Informe registro profissional");
            return;
        }
    }

    gerarCard(usuario);

    localStorage.setItem("usuarioGeoUrban", JSON.stringify(usuario));

    resposta.innerHTML = "✅ Cadastro salvo com sucesso";
}

function gerarCard(u){
    cardUsuario.innerHTML = `
    <div class="card">
        <h3>${u.nome}</h3>
        <p>${u.categoria} - ${u.nivel || "-"}</p>
        <p>${u.profissao || "-"}</p>
        <p>${u.registroTipo || "-"} ${u.registroNumero || ""}</p>
        <p>${u.regiao || "-"}, ${u.pais || "-"}</p>
        <p>${u.situacao || "-"}</p>
    </div>
    `;
}

window.onload = function(){
    const salvo = localStorage.getItem("usuarioGeoUrban");
    if(salvo){
        gerarCard(JSON.parse(salvo));
    }
}

</script>

</body>
</html>

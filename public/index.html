<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoUrban</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1b5e20, #4caf50);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: rgba(0,0,0,0.3);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #00e676;
    cursor: pointer;
    font-weight: bold;
}

/* LOGIN */
#login {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: #111;
    padding: 20px;
    border-radius: 10px;
    z-index: 9999;
    color: #0f0;
}

#login input {
    display: block;
    margin: 5px 0;
    padding: 8px;
}

/* PAINEL */
#painel {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #000;
    color: #0f0;
    padding: 15px;
    border-radius: 10px;
    z-index: 9999;
}

#painel button {
    display: block;
    width: 100%;
    margin-top: 5px;
    background: #222;
    color: #0f0;
}
</style>
</head>

<body>

<div class="card">
    <h1>🌍 GeoUrban</h1>
    <p>Sistema ativo e seguro</p>
    <button onclick="abrirLogin()">Entrar</button>
</div>

<!-- LOGIN -->
<div id="login">
    <h3>Login</h3>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="logar()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel">
    <b>CONTROLE</b>
    <button onclick="ativarControle()">Ativar</button>
    <button onclick="resetar()">Resetar</button>
</div>

<script>

// ABRIR LOGIN
function abrirLogin() {
    document.getElementById("login").style.display = "block";
}

// LOGIN
function logar() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u === "admin" && p === "123") {
        alert("Login OK 🚀");
        localStorage.setItem("logado", "true");
        document.getElementById("login").style.display = "none";
        document.getElementById("painel").style.display = "block";
    } else {
        alert("Erro ❌");
    }
}

// CONTROLE
function ativarControle() {
    alert("Controle ativo 🔥");
}

// RESET
function resetar() {
    localStorage.clear();
    location.reload();
}

// AUTO LOGIN
if (localStorage.getItem("logado") === "true") {
    document.getElementById("painel").style.display = "block";
}

// ATALHO
document.addEventListener("keydown", function(e) {
    if (e.ctrlKey && e.key === "9") {
        document.getElementById("painel").style.display = "block";
    }
});

</script>

</body>
</html>

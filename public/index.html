<!-- ENTRADA INTELIGENTE COMPLETA FINAL -->

<div id="entrada" class="panel" style="display:none;">

<button onclick="voltar()">⬅ Voltar</button>

<h2>🌐 Cadastro do Usuário</h2>
<p>Preencha suas informações</p>

<form id="formEntrada" onsubmit="salvarEntrada(event)">

<h3>📌 Dados Básicos</h3>
<input type="text" placeholder="Nome completo" required><br><br>
<input type="text" placeholder="CPF" required><br><br>
<input type="email" placeholder="Email" required><br><br>

<h3>🌍 Endereço</h3>
<input type="text" placeholder="País" required><br><br>
<input type="text" placeholder="Região / Estado" required><br><br>
<input type="text" placeholder="CEP" required><br><br>

<h3>💼 Profissional</h3>
<input type="text" placeholder="Profissão"><br><br>
<input type="text" placeholder="Especialidade"><br><br>

<h3>📊 Situação Profissional</h3>
<select id="situacao" required>
<option value="">Selecione</option>
<option value="formacao">Em formação</option>
<option value="ativo">Ativo regular</option>
<option value="autonomo">Autônomo / informal</option>
<option value="aposentado">Aposentado</option>
<option value="institucional">Institucional</option>
</select><br><br>

<h3>🪪 Registro Técnico</h3>
<select id="registroTipo">
<option value="">Tipo de registro</option>
<option value="CREA">CREA (ART)</option>
<option value="CAU">CAU (RRT)</option>
<option value="CFT">CFT (TRT)</option>
<option value="OUTRO">Outro</option>
</select><br><br>

<input type="text" id="registroNumero" placeholder="Número do registro"><br><br>

<h3>📞 Contato</h3>
<input type="text" placeholder="Telefone Fixo"><br><br>
<input type="text" placeholder="Telefone Móvel" required><br><br>

<button type="submit">Cadastrar</button>

</form>

<div id="respostaEntrada"></div>

</div>

<script>
function salvarEntrada(e){
    e.preventDefault();

    const situacao = document.getElementById("situacao").value;
    const tipoRegistro = document.getElementById("registroTipo").value;
    const numeroRegistro = document.getElementById("registroNumero").value;

    // REGRA: somente ativo regular exige validação obrigatória
    if(situacao === "ativo"){

        if(!tipoRegistro){
            alert("Selecione o tipo de registro profissional");
            return;
        }

        if(!numeroRegistro || numeroRegistro.length < 5){
            alert("Registro profissional inválido");
            return;
        }

        const padrao = /^[0-9A-Za-z\-\/]+$/;

        if(!padrao.test(numeroRegistro)){
            alert("Formato de registro inválido");
            return;
        }
    }

    document.getElementById("respostaEntrada").innerHTML =
    "✅ Cadastro realizado com sucesso";

    registrar("Cadastro concluído com validação por situação");
}
</script>

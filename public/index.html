<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban</title>

<style>
body{
    font-family:Arial;
    background:#0a0f1c;
    color:#fff;
    padding:20px;
}

input, select{
    display:block;
    margin:5px 0;
    padding:8px;
    width:300px;
}

button{
    padding:10px;
    margin-top:10px;
}

.card{
    margin-top:20px;
    background:#0b1a2a;
    padding:20px;
}
</style>

</head>

<body>

<h2>Cadastro</h2>

<form onsubmit="salvar(event)">

<input id="nome" placeholder="Nome" required>
<input id="email" placeholder="Email" required>

<select id="categoria">
<option value="">Categoria</option>
<option>Estudante</option>
<option>Profissional</option>
</select>

<select id="nivel">
<option value="">Nível</option>
<option>Graduação</option>
<option>Mestrado</option>
</select>

<input id="profissao" placeholder="Profissão">

<select id="registroTipo">
<option value="">Registro</option>
<option>CREA</option>
<option>CAU</option>
</select>

<input id="registroNumero" placeholder="Número registro">

<button type="submit">Cadastrar</button>

</form>

<div id="resposta"></div>
<div id="cardUsuario"></div>

<script>

function salvar(e){
    e.preventDefault();

    const usuario = {
        nome: document.getElementById("nome").value,
        email: document.getElementById("email").value,
        categoria: document.getElementById("categoria").value,
        nivel: document.getElementById("nivel").value,
        profissao: document.getElementById("profissao").value,
        registroTipo: document.getElementById("registroTipo").value,
        registroNumero: document.getElementById("registroNumero").value
    };

    if(usuario.categoria === "Profissional"){
        if(!usuario.registroTipo || !usuario.registroNumero){
            alert("Informe registro profissional");
            return;
        }
    }

    document.getElementById("cardUsuario").innerHTML =
    "<div class='card'><h3>"+usuario.nome+"</h3><p>"+usuario.categoria+"</p></div>";

    localStorage.setItem("usuarioGeoUrban", JSON.stringify(usuario));

    document.getElementById("resposta").innerHTML = "OK";
}

</script>

</body>
</html>

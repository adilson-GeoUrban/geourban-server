<script>
// LOGIN SEGURO
function login() {
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pass").value.trim();

    document.getElementById("erro").innerText = "";

    if (u === "admin" && p === "1234") {
        sessionStorage.setItem("auth", "ok"); // mais seguro que localStorage
        iniciar();
    } else {
        document.getElementById("erro").innerText = "Login inválido";
    }
}

// INICIAR
function iniciar() {
    document.getElementById("login").style.display = "none";
    document.getElementById("home").style.display = "block";
    carregar();
}

// LOGOUT
function logout() {
    sessionStorage.clear();
    location.reload();
}

// TELAS
function abrir(t) {
    document.querySelectorAll(".tela").forEach(e => e.style.display = "none");
    document.getElementById(t).style.display = "block";
}

// SALVAR COM VALIDAÇÃO
function salvar() {
    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim();

    if (!nome || !email) {
        alert("Preencha todos os campos");
        return;
    }

    let lista = JSON.parse(localStorage.getItem("dados") || "[]");

    lista.push({ nome, email, data: new Date().toISOString() });

    localStorage.setItem("dados", JSON.stringify(lista));

    backupAutomatico(lista);

    document.getElementById("nome").value = "";
    document.getElementById("email").value = "";

    carregar();
}

// BACKUP AUTOMÁTICO
function backupAutomatico(dados) {
    const blob = new Blob([JSON.stringify(dados, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "backup-geourban.json";
    a.click();
}

// CARREGAR
function carregar() {
    let lista = JSON.parse(localStorage.getItem("dados") || "[]");

    let html = "";
    lista.forEach(u => {
        html += `<p>${u.nome} - ${u.email}</p>`;
    });

    document.getElementById("lista").innerHTML = html;
}

// AUTO LOGIN
window.onload = function() {
    if (sessionStorage.getItem("auth") === "ok") {
        iniciar();
    }
}
</script>

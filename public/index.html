<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban</title>

<style>

/* FUNDO */
body{
    margin:0;
    font-family:Arial;
    color:#fff;
    background:linear-gradient(-45deg,#0a0f1c,#0d1b2a,#1b263b);
}

/* HERO */
.hero{
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

/* GRID BASE (NÃO QUEBRA) */
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    max-width:800px;
    margin:20px;
}

/* INPUTS */
input, select{
    padding:10px;
    border:none;
    border-radius:5px;
}

/* BOTÃO */
button{
    padding:12px;
    background:#1e90ff;
    color:#fff;
    border:none;
    border-radius:6px;
}

/* CARD */
.card{
    margin:20px;
    padding:15px;
    background:#102a44;
    border-radius:10px;
}

/* CHAT */
.chat{
    position:fixed;
    right:20px;
    bottom:20px;
    width:220px;
    background:#0b1a2a;
    padding:10px;
    border-radius:10px;
}

/* RODAPÉ BASE */
.footer-card{
    position:fixed;
    bottom:0;
    width:100%;
    text-align:center;
    padding:10px;
    background:#000;
}

</style>

</head>

<body>

<div class="hero">🚀 GeoUrban</div>

<form class="grid" onsubmit="salvar(event)">

<input id="nome" placeholder="Nome completo">
<input id="email" placeholder="Email">

<select id="categoria">
<option>Categoria</option>
<option>Estudante</option>
<option>Profissional</option>
</select>

<select id="nivel">
<option>Nível</option>
<option>Graduação</option>
<option>Mestrado</option>
</select>

<input id="profissao" placeholder="Profissão">
<input id="especializacao" placeholder="Especialização">

<select id="registroTipo">
<option>Registro</option>
<option>CREA</option>
<option>CAU</option>
<option>CFT</option>
</select>

<input id="registroNumero" placeholder="Número do registro">

<select id="docTipo">
<option>Documento</option>
<option>ART</option>
<option>RRT</option>
<option>TRT</option>
</select>

<input id="docNumero" placeholder="Número do documento">

<input id="pais" placeholder="País">
<input id="regiao" placeholder="Região">

<select id="situacao">
<option>Situação</option>
<option>Ativo</option>
<option>Autônomo</option>
<option>Aposentado</option>
</select>

<button>Cadastrar</button>

</form>

<div id="cardUsuario"></div>
<div id="resposta"></div>

<div class="chat">🤖 Assistente ativo</div>

<div class="footer-card">
<button onclick="baixarCarteira()">💳 Carteira Digital</button>
</div>

<script>

/* SALVAR BASE */
function salvar(e){
    e.preventDefault();

    const usuario = {
        nome: nome.value,
        categoria: categoria.value
    };

    localStorage.setItem("usuarioGeoUrban", JSON.stringify(usuario));

    cardUsuario.innerHTML = "<div class='card'>Cadastro salvo</div>";
}

/* DOWNLOAD */
function baixarCarteira(){
    const dados = localStorage.getItem("usuarioGeoUrban");
    if(!dados) return alert("Cadastre primeiro");

    const blob = new Blob([dados]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "carteira.json";
    a.click();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban Login</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.box {
  background: #222;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
  box-shadow: 0 0 15px rgba(0,255,136,0.2);
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  box-sizing: border-box;
}

button {
  background: #00ff88;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  opacity: 0.9;
}

#status {
  margin-top: 10px;
  min-height: 20px;
}
</style>
</head>

<body>

<div class="box">
  <h2>GeoUrban</h2>

  <input type="text" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <p id="status"></p>
</div>

<script>
async function login() {

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const status = document.getElementById('status');

  if (!email || !password) {
    status.innerText = "⚠️ Preencha todos os campos";
    return;
  }

  status.innerText = "⏳ Conectando...";

  try {

    const res = await fetch('/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!data.success) {
      status.innerText = "❌ Credenciais inválidas";
      return;
    }

    // 💾 SALVA SESSÃO
    localStorage.setItem('usuario', data.user.email);
    localStorage.setItem('user', data.user.email);

    if (data.token) {
      localStorage.setItem('token', data.token);
    }

    status.innerText = "✅ Login realizado";

    // 🚀 REDIRECIONAMENTO BLINDADO
    setTimeout(() => {
      window.location.href = "/ia.html";
    }, 8080);

  } catch (err) {
    console.error(err);
    status.innerText = "❌ Erro ao conectar servidor";
  }
}
</script>

</body>
</html>

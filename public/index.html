<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GeoUrban</title>
</head>

<body style="background:black; color:white; text-align:center; margin-top:80px; font-family:Arial;">

  <h1>GeoUrban</h1>
  <p>⚠️ LGPD: seus dados são protegidos e usados apenas na plataforma.</p>

  <div id="chat"></div>

  <input id="input" placeholder="Digite aqui..." style="padding:10px;">
  <button onclick="enviar()">Enviar</button>

  <br><br>

  <button onclick="irLogin()">Entrar direto</button>

  <script>
    const chat = document.getElementById("chat");

    function escrever(t) {
      const p = document.createElement("p");
      p.innerText = t;
      chat.appendChild(p);
    }

    escrever("Luiza: Sistema iniciado.");
    escrever("Luiza: Você possui limitação visual, auditiva ou motora?");

    function enviar() {
      const input = document.getElementById("input");
      const msg = input.value;
      const cmd = msg.toLowerCase().trim();

      escrever("Você: " + msg);

      // 🔐 comando direto login
      if (cmd === "login") {
        window.location.href = "/login.html";
        return;
      }

      // 🎯 acessibilidade
      if (cmd.includes("visual") || cmd.includes("auditiva") || cmd.includes("motora")) {
        localStorage.setItem("acessibilidade", cmd);
        escrever("Luiza: Perfil registrado.");
        escrever("Luiza: Digite LOGIN ou CADASTRO.");
        input.value = "";
        return;
      }

      escrever("Luiza: Digite LOGIN ou CADASTRO.");
      input.value = "";
    }

    function irLogin() {
      window.location.href = "/login.html";
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoUrban</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;
}

/* FUNDO COM IMAGEM */
.fundo {
    background: url("sua-imagem.jpg") no-repeat center center;
    background-size: cover;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* CAIXA ESCURA POR CIMA */
.overlay {
    background: rgba(0,0,0,0.5);
    padding: 40px;
    border-radius: 20px;
    display: inline-block;
}

/* BOTÃO */
button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 18px;
    background: #00e676;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="fundo">
    <div class="overlay">
        <h1>🚀 GEOURBAN ONLINE</h1>
        <p>Sistema ativo e funcionando</p>

        <a href="/ia.html">
            <button>🤖 Abrir IA</button>
        </a>
    </div>
</div>

</body>
</html>

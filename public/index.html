<style>
body {
    margin: 0;
    font-family: Arial;
    background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') no-repeat center/cover;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

/* COLUNA ESQUERDA */
.left-panel {
    position: fixed;
    left: 0;
    top: 0;
    width: 400px;
    height: 100%;
    background: rgba(0,0,0,0.85);
    padding: 20px;
    color: #fff;
    overflow-y: auto;
}

/* IA */
.ia-top {
    margin-bottom: 20px;
}

.ia-top input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

/* CADASTRO */
.cadastro-box input, 
.cadastro-box select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

/* SLIDES DIREITA */
.slides {
    position: fixed;
    right: 0;
    top: 0;
    width: calc(100% - 400px);
    height: 100%;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    color: #fff;
    padding: 40px;
    font-size: 28px;
    background: rgba(0,0,0,0.5);
}

.slide.active {
    display: block;
}
</style>

<div class="overlay"></div>

<!-- ESQUERDA -->
<div class="left-panel">

    <!-- IA -->
    <div class="ia-top">
        <h3>👩 Assistente GeoUrban</h3>
        <p>Bem-vindo 👋</p>
        <p>Vamos criar sua identidade profissional 🚀</p>

        <input placeholder="Ex: sou engenheiro..." />
    </div>

    <!-- CADASTRO -->
    <div class="cadastro-box">
        <h3>Cadastro</h3>

        <input id="nome" placeholder="Nome">
        <input id="email" placeholder="Email">

        <select id="categoria">
            <option>Profissional</option>
            <option>Estudante</option>
        </select>

        <select id="nivel">
            <option>Básico</option>
            <option>Avançado</option>
        </select>

        <input id="profissao" placeholder="Profissão">
        <input id="especializacao" placeholder="Especialização">

        <select id="registroTipo">
            <option>CREA</option>
            <option>CAU</option>
        </select>

        <input id="registroNumero" placeholder="Número do registro">

        <button onclick="salvar()">Cadastrar</button>
    </div>

</div>

<!-- SLIDES -->
<div class="slides">
    <div class="slide active">🚀 Conecte-se com profissionais</div>
    <div class="slide">📊 Plataforma técnica completa</div>
    <div class="slide">📎 Upload de ART / RRT</div>
    <div class="slide">🤝 Network profissional</div>
</div>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoUrban</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1b5e20, #4caf50);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
}

/* INPUT */
input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    border-radius: 5px;
    border: none;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 5px;
    background: #00c853;
    color: white;
    cursor: pointer;
}

/* ESCONDER */
.hidden {
    display: none;
}
</style>
</head>

<body>

<!-- TELA INICIAL -->
<div id="inicio" class="card">
    <h2>🌍 GeoUrban</h2>
    <p>Sistema ativo e seguro</p>
    <button onclick="abrirLogin()">Entrar</button>
</div>

<!-- LOGIN -->
<div id="login" class="card hidden">
    <h3>Login</h3>

    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="logar()">Acessar</button>

    <p id="msg"></p>
</div>

<!-- PAINEL -->
<div id="painel" class="card hidden">
    <h3>Bem-vindo</h3>
    <p id="userLogado"></p>

    <button onclick="verChave()">Ver chave</button>
    <button onclick="sair()">Sair</button>
</div>

<script>

// ABRIR LOGIN
function abrirLogin(){
    document.getElementById("inicio").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}

// LOGIN
function logar(){
    const user = document.getElementById("usuario").value;
    const pass = document.getElementById("senha").value;
    const msg = document.getElementById("msg");

    if(user === "Admin" && pass === "1234"){

        // 🔐 SALVA ACESSO
        localStorage.setItem("usuario", user);
        localStorage.setItem("chave", "geo123");
        localStorage.setItem("acesso", "true");

        entrarSistema();

    } else {
        msg.innerText = "❌ Dados incorretos";
        msg.style.color = "red";
    }
}

// ENTRA NO SISTEMA
function entrarSistema(){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("painel").classList.remove("hidden");

    const user = localStorage.getItem("usuario");
    document.getElementById("userLogado").innerText = "Usuário: " + user;
}

// VER CHAVE
function verChave(){
    alert("Chave: " + localStorage.getItem("chave"));
}

// SAIR
function sair(){
    localStorage.clear();
    location.reload();
}

// AUTO LOGIN
if(localStorage.getItem("acesso") === "true"){
    document.getElementById("inicio").classList.add("hidden");
    entrarSistema();
}

</script>

</body>
</html>

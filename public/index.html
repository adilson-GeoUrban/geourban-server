<!-- ================= INTRO + LGPD + LUIZA ================= -->
<div id="intro" style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Arial;z-index:9999;">

    <!-- 🎬 SLIDES -->
    <div id="slide" style="font-size:22px;text-align:center;max-width:80%;margin-bottom:20px;"></div>

    <!-- 🔊 ÁUDIO -->
    <audio id="bgAudio" loop>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <!-- 📜 LGPD -->
    <div id="lgpdBox" style="background:#222;padding:15px;border-radius:8px;text-align:center;">
        ⚠️ Aviso de Privacidade (LGPD)<br><br>
        Seus dados serão usados apenas para acesso e operação da plataforma.<br>
        Não compartilhamos sem autorização.<br><br>

        <button onclick="aceitarTudo()" style="padding:10px;">Aceito e continuar</button>
    </div>
</div>

<!-- 🤖 CHAT LUIZA -->
<div id="chat" style="position:fixed;bottom:10px;right:10px;width:300px;background:#ffffff;border-radius:10px;padding:10px;font-family:Arial;box-shadow:0 0 10px rgba(0,0,0,0.3);">
    <div id="mensagens" style="height:200px;overflow:auto;font-size:14px;"></div>
    <input id="input" placeholder="Digite aqui..." style="width:70%;" />
    <button onclick="enviar()">OK</button>
</div>

<!-- 🔐 BOTÕES BLOQUEADOS -->
<button id="btnLogin" disabled>Login</button>
<button id="btnCadastro" disabled>Cadastro</button>

<script>
// ================= SLIDES =================
const slides = [
"🌍 Bem-vindo ao GeoUrban",
"🚀 Gestão urbana inteligente",
"🔐 Segurança e privacidade",
"🤖 Atendimento com IA",
"📊 Controle total da plataforma"
];

let i = 0;

function rodarSlides() {
    document.getElementById("slide").innerText = slides[i];
    i = (i + 1) % slides.length;
}

setInterval(rodarSlides, 3000);
rodarSlides();


// ================= ESTADO =================
let sistemaLiberado = false;
let perfil = {
    visual: null,
    auditiva: null,
    motora: null,
    escolaridade: null,
    profissao: null
};


// ================= ACEITE LGPD =================
function aceitarTudo() {
    sistemaLiberado = true;

    const audio = document.getElementById("bgAudio");
    audio.play().catch(() => {});

    document.getElementById("intro").style.display = "none";

    mostrar("Luiza: Olá. Para um atendimento adequado, preciso entender você.");
    mostrar("Luiza: Você possui alguma limitação visual, auditiva ou motora?");
}


// ================= CHAT =================
function enviar() {
    const input = document.getElementById("input");
    const msg = input.value.toLowerCase();

    if (!sistemaLiberado) {
        mostrar("Luiza: Aceite a política para continuar.");
        return;
    }

    mostrar("Você: " + msg);

    // 🧠 COLETA PERFIL
    if (!perfil.visual) {
        perfil.visual = msg;
        mostrar("Luiza: Entendido. Existe alguma limitação auditiva?");
    }
    else if (!perfil.auditiva) {
        perfil.auditiva = msg;
        mostrar("Luiza: Certo. Existe alguma limitação motora?");
    }
    else if (!perfil.motora) {
        perfil.motora = msg;
        mostrar("Luiza: Qual seu nível de escolaridade?");
    }
    else if (!perfil.escolaridade) {
        perfil.escolaridade = msg;
        mostrar("Luiza: Qual sua profissão?");
    }
    else if (!perfil.profissao) {
        perfil.profissao = msg;

        mostrar("Luiza: Perfil registrado. Direcionando atendimento...");

        adaptarAtendimento();
    }
    else {
        // 🎯 FLUXO NORMAL
        if (msg.includes("login")) {
            mostrar("Luiza: Acesso liberado. Informe seu usuário.");
            document.getElementById("btnLogin").disabled = false;
        }
        else if (msg.includes("cadastro")) {
            mostrar("Luiza: Cadastro liberado.");
            document.getElementById("btnCadastro").disabled = false;
        }
        else {
            mostrar("Luiza: Digite LOGIN ou CADASTRO.");
        }
    }

    input.value = "";
}


// ================= ADAPTAÇÃO =================
function adaptarAtendimento() {

    // exemplo simples de adaptação
    if (perfil.visual.includes("sim")) {
        document.body.style.fontSize = "20px";
        mostrar("Luiza: Ajustei a interface para melhor visualização.");
    }

    mostrar("Luiza: Atendimento pronto. Digite LOGIN ou CADASTRO.");
}


// ================= UI =================
function mostrar(texto) {
    const div = document.getElementById("mensagens");
    div.innerHTML += "<p>" + texto + "</p>";
    div.scrollTop = div.scrollHeight;
}
</script>

<script>
function aceitarLGPD() {
    localStorage.setItem("lgpd", "true");
    document.getElementById("lgpd-box").style.display = "none";
    document.getElementById("luiza").style.display = "block";

    iniciarLuiza();
}

function iniciarLuiza() {
    const area = document.getElementById("chat-area");

    area.innerHTML += `
    <div><b>Luiza:</b> 🔒 Sistema iniciado com protocolo de segurança.</div>
    <div><b>Luiza:</b> 📊 Modo ativo: Análise Técnica Pericial.</div>
    <div><b>Luiza:</b> 🛡️ Seus dados estão protegidos e não são compartilhados com terceiros.</div>
    <div><b>Luiza:</b> 🤖 Posso analisar, auditar e orientar com precisão técnica.</div>
    `;
}

function enviar() {
    const input = document.getElementById("chat-input");
    const area = document.getElementById("chat-area");
    const msg = input.value.toLowerCase();

    if (!msg) return;

    area.innerHTML += "<div><b>Você:</b> " + input.value + "</div>";

    let resposta = "";

    if (msg.includes("segurança") || msg.includes("vazamento")) {
        resposta = `
        🔒 LAUDO TÉCNICO:
        Não há evidência de vazamento.
        Sistema operando dentro dos padrões seguros.
        Recomenda-se validação de logs e controle de acesso.
        `;
    }

    else if (msg.includes("invas") || msg.includes("hack")) {
        resposta = `
        🚫 ANÁLISE DE INCIDENTE:
        Não foram identificados sinais de invasão.
        Nenhuma alteração externa detectada.
        Ambiente íntegro.
        `;
    }

    else if (msg.includes("erro") || msg.includes("bug")) {
        resposta = `
        ⚠️ DIAGNÓSTICO:
        Possível falha operacional ou deploy não atualizado.
        Verificar logs e ambiente de execução.
        `;
    }

    else {
        resposta = `
        📊 ANÁLISE:
        Solicitação recebida.
        Processando com base em critérios técnicos e segurança.
        `;
    }

    area.innerHTML += "<div><b>Luiza:</b> " + resposta + "</div>";

    input.value = "";
    area.scrollTop = area.scrollHeight;
}

function abrirLogin() {
    window.open("/login", "_blank", "noopener,noreferrer");
}
</script>

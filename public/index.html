<!-- 🛠️ PAINEL DE EMERGÊNCIA FLUTUANTE -->
<div id="painel-emergencia" style="
position:fixed;
bottom:20px;
right:20px;
background:#000;
color:#0f0;
padding:15px;
border-radius:10px;
z-index:9999;
font-size:12px;
box-shadow:0 0 10px #0f0;
">

<b>⚡ Controle Direto</b><br><br>

<button onclick="ativarControle()">Ativar Controle</button><br>
<button onclick="forcarLogin()">Forçar Login</button><br>
<button onclick="limparSistema()">Resetar</button>

<div id="status-emergencia" style="margin-top:10px;"></div>

</div>

<script>

// ⚡ ATIVA CONTROLE
function ativarControle(){
    localStorage.setItem("controle", "ativo");
    document.getElementById("status-emergencia").innerText = "Controle ATIVO";
}

// 🔐 FORÇA LOGIN
function forcarLogin(){
    localStorage.setItem("logado", "true");
    location.reload();
}

// 🧹 RESET
function limparSistema(){
    localStorage.clear();
    location.reload();
}

</script>

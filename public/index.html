<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GeoUrban</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      margin-top: 80px;
      font-family: Arial;
      transition: all 0.5s ease;
    }

    .fade-out {
      opacity: 0;
      transform: scale(0.98);
    }
  </style>
</head>

<body id="body">

  <h1>GeoUrban</h1>
  <p>⚠️ LGPD: seus dados são protegidos e usados apenas na plataforma.</p>

  <div id="chat"></div>

  <input id="input" placeholder="Digite aqui..." style="padding:10px;">
  <button onclick="enviar()">Enviar</button>

  <br><br>
  <button onclick="irLogin()">Entrar</button>

  <script>
    const chat = document.getElementById("chat");
    const body = document.getElementById("body");

    function escrever(t) {
      const p = document.createElement("p");
      p.innerText = t;
      chat.appendChild(p);
    }

    escrever("Luiza: Sistema iniciado.");
    escrever("Luiza: Você possui limitação visual, auditiva ou motora?");

    function transicao(destino) {
      body.classList.add("fade-out");

      setTimeout(() => {
        window.location.href = destino;
      }, 500);
    }

    function enviar() {
      const input = document.getElementById("input");
      const msg = input.value;
      const cmd = msg.toLowerCase().trim();

      escrever("Você: " + msg);

      // 🔐 LOGIN DIRETO
      if (cmd === "login") {
        transicao("/login.html");
        return;
      }

      // 🎯 ACESSIBILIDADE
      if (cmd.includes("visual") || cmd.includes("auditiva") || cmd.includes("motora")) {
        localStorage.setItem("acessibilidade", cmd);

        escrever("Luiza: Perfil registrado.");
        escrever("Luiza: Digite LOGIN ou CADASTRO.");

        input.value = "";
        return;
      }

      escrever("Luiza: Digite LOGIN ou CADASTRO.");
      input.value = "";
    }

    function irLogin() {
      transicao("/login.html");
    }
  </script>

</body>
</html>

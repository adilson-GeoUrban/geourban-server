<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban Plataforma</title>

<!-- GANTT -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt/dist/frappe-gantt.css">
<script src="https://cdn.jsdelivr.net/npm/frappe-gantt/dist/frappe-gantt.min.js"></script>

<style>
body {
    font-family: Arial;
    background:#0a0f1c;
    color:#fff;
    text-align:center;
}

input, button {
    padding:10px;
    margin:5px;
}

#log {
    height:200px;
    overflow:auto;
    background:#111;
    margin:10px;
    padding:10px;
    text-align:left;
}

#gantt {
    background:#fff;
    color:#000;
    margin-top:20px;
}
</style>
</head>

<body>

<h2>🧠 GeoUrban Sistema Integrado</h2>

<!-- COMANDO -->
<input id="cmd" placeholder="Digite comando ou use voz..." />
<button onclick="enviar()">Enviar</button>
<button onclick="ativarVoz()">🎙️ Voz</button>

<!-- LOG -->
<div id="log"></div>

<!-- GANTT -->
<h3>📊 Planejamento</h3>
<div id="gantt"></div>

<script>

// =======================
// LOG VISUAL
// =======================
function log(msg){
    const l = document.getElementById("log");
    l.innerHTML += "<div>"+msg+"</div>";
    l.scrollTop = l.scrollHeight;
}

// =======================
// LOG LEGAL
// =======================
function logLegal(acao){
    const registro = {
        usuario:"admin",
        acao:acao,
        data:new Date().toISOString()
    };

    console.log("LOG LEGAL:", registro);
}

// =======================
// COMANDO
// =======================
function enviar(){
    let c = document.getElementById("cmd").value;
    log("👤 "+c);
    interpretar(c);
}

// =======================
// IA PRINCIPAL
// =======================
function interpretar(c){

    logLegal(c);

    if(c.includes("financeiro")){
        log("💰 Abrindo financeiro");
    }
    else if(c.includes("bloquear")){
        log("⛔ Usuário bloqueado");
    }
    else if(c.includes("mapa")){
        log("🗺️ Abrindo mapa");
    }
    else if(c.includes("relatorio")){
        log("📄 Gerando relatório");
    }
    else{
        log("🤖 IA aprendendo...");
    }

    analisarSeguranca(c);
}

// =======================
// IA SEGURANÇA
// =======================
function analisarSeguranca(c){

    if(c.includes("hack") || c.includes("burlar")){
        log("🚨 ALERTA DE SEGURANÇA");
        logLegal("Tentativa suspeita");
    }

}

// =======================
// GANTT
// =======================
new Gantt("#gantt", [
    {id:"1",name:"Fundação",start:"2026-05-01",end:"2026-05-10"},
    {id:"2",name:"Estrutura",start:"2026-05-11",end:"2026-05-25"},
    {id:"3",name:"Acabamento",start:"2026-05-26",end:"2026-06-10"}
]);

// =======================
// VOZ
// =======================
function ativarVoz(){

    const rec = new webkitSpeechRecognition();
    rec.lang = "pt-BR";

    rec.onresult = (e)=>{
        let t = e.results[0][0].transcript;
        log("🎙️ "+t);
        interpretar(t);
    };

    rec.start();
}

// =======================
// MONITORAMENTO
// =======================
setInterval(()=>{
    log("🛰️ Sistema monitorando...");
},15000);

</script>

<!-- =======================
BACKUP GEOURBAN V1
======================= -->

OBS:

-->

</body>
</html>

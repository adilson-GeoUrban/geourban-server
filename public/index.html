<script>
function entrar() {
    // cria tela de login dinamicamente
    const tela = document.createElement("div");

    tela.innerHTML = `
    <div style="
        position: fixed;
        top:0; left:0;
        width:100%; height:100%;
        background: rgba(0,0,0,0.9);
        display:flex;
        justify-content:center;
        align-items:center;
        z-index:99999;
    ">
        <div style="
            background:#111;
            padding:30px;
            border-radius:10px;
            text-align:center;
            width:300px;
        ">
            <h2>Login</h2>
            <input id="user" placeholder="Usuário" style="width:100%;padding:8px;margin:5px 0;"><br>
            <input id="pass" type="password" placeholder="Senha" style="width:100%;padding:8px;margin:5px 0;"><br>
            <button onclick="validarLogin()">Entrar</button>
            <p id="erro" style="color:red;"></p>
        </div>
    </div>
    `;

    document.body.appendChild(tela);
}

// valida login
function validarLogin() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if (u === "Admin" && p === "1234") {
        localStorage.setItem("usuario", "admin");

        document.body.innerHTML = `
        <div style="padding:20px">
            <h1>Painel Administrativo</h1>
            <p>Controle total do sistema liberado ✅</p>
        </div>
        `;
    } else {
        document.getElementById("erro").innerText = "Dados incorretos";
    }
}
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel GeoUrban</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      color: white;
      text-align: center;

      /* 🌆🌱 imagem conceito cidade + rural */
      background: url("bg.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: rgba(0,0,0,0.75);
      min-height: 100vh;
      padding: 30px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(4px);
    }

    .card:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="overlay">

<h1>GeoUrban</h1>
<div id="usuario"></div>

<div class="grid" id="painel"></div>

</div>

<script>
  const user = localStorage.getItem("usuario");
  let camadas = JSON.parse(localStorage.getItem("camadas") || "[]");

  // 🔐 segurança
  if (!user) {
    window.location.href = "/login.html";
  }

  // 🧠 fallback inteligente
  if (!camadas || camadas.length === 0) {
    camadas = ["educacao"];
    localStorage.setItem("camadas", JSON.stringify(camadas));
  }

  document.getElementById("usuario").innerText = "Usuário: " + user;

  const painel = document.getElementById("painel");

  const mapa = {
    educacao: "📚 Educação",
    cursos: "🎓 Cursos",
    simulacoes: "🧪 Simulações",
    consultoria: "🧠 Consultoria",
    clientes: "👥 Clientes",
    cadastro_tecnico: "📄 Cadastro Técnico",
    loja: "🛒 Loja",
    gestao: "🏛️ Gestão",
    auditoria: "🔍 Auditoria",
    relatorios: "📊 Relatórios",
    controle: "⚙️ Controle"
  };

  // 🔥 AUTO ABRIR PRIMEIRO MÓDULO
  function abrirModulo(nome) {
    alert("Abrindo módulo: " + nome);
  }

  // 🔥 monta painel
  camadas.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = mapa[c] || c;

    div.onclick = () => abrirModulo(mapa[c] || c);

    painel.appendChild(div);

    // 🚀 abre automaticamente o primeiro
    if (i === 0) {
      setTimeout(() => {
        abrirModulo(mapa[c] || c);
      }, 800);
    }
  });
</script>

</body>
</html>

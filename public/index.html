<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0f1c;
    color:#fff;
}

.container{
    padding:20px;
}

.card{
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    width:200px;
}

.sistema{
    display:none;
    margin-top:20px;
}

.sistema.active{
    display:flex;
    gap:20px;
}

.form-area{
    width:60%;
}

.chat-area{
    width:40%;
    background:#111827;
    padding:15px;
    border-radius:10px;
}

input, select{
    display:block;
    margin:8px 0;
    padding:8px;
    width:100%;
}

button{
    margin-top:10px;
    padding:10px;
    cursor:pointer;
}

.sugestoes{
    margin-top:20px;
    display:none;
    background:#1f2937;
    padding:15px;
    border-radius:10px;
}

.popup{
    display:none;
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 GeoUrban</h1>

<div class="card" onclick="abrirSistema()">
🌐 Iniciar Cadastro
</div>

<div id="sistema" class="sistema">

<div class="form-area">

<h3>Cadastro Completo</h3>

<form oninput="detectarInteresse()" onsubmit="salvar(event)">

<input id="nome" placeholder="Nome completo" required>
<input id="email" placeholder="Email" required>

<input id="pais" placeholder="País">
<input id="regiao" placeholder="Região">
<input id="cep" placeholder="CEP">

<input id="profissao" placeholder="Profissão">
<input id="especialidade" placeholder="Especialidade">

<select id="tipoRegistro">
<option value="">Tipo de Registro</option>
<option>CREA</option>
<option>CAU</option>
<option>CFT</option>
<option>ART</option>
<option>RRT</option>
<option>TRT</option>
</select>

<input id="registro" placeholder="Número do registro">

<input placeholder="Telefone Fixo">
<input placeholder="Telefone Móvel">

<select id="situacao">
<option value="">Situação</option>
<option value="ativo">Ativo</option>
<option value="autonomo">Autônomo</option>
<option value="aposentado">Aposentado</option>
<option value="informal">Atividade informal</option>
</select>

<button type="submit">Cadastrar</button>

</form>

<div id="resposta"></div>

</div>

<div class="chat-area">
<h4>🤖 Assistente</h4>
<div id="chatBox">Olá, posso te ajudar no cadastro 👋</div>
</div>

</div>

<div id="sugestoes" class="sugestoes"></div>

<div id="popup" class="popup">
Deseja ver cursos recomendados?
<br><br>
<button onclick="mostrarCursos()">Sim</button>
<button onclick="fecharPopup()">Agora não</button>
</div>

</div>

<script>
function abrirSistema(){
    document.getElementById("sistema").classList.add("active");

    setTimeout(()=>{
        document.getElementById("popup").style.display = "block";
    },2000);
}

function detectarInteresse(){
    const prof = document.getElementById("profissao").value.toLowerCase();

    if(prof.includes("engenheiro")){
        document.getElementById("chatBox").innerHTML =
        "💡 Detectamos perfil técnico. Deseja cursos e certificações?";
    }
}

function mostrarCursos(){
    document.getElementById("sugestoes").style.display = "block";
    document.getElementById("sugestoes").innerHTML =
    "🎓 Engenharia Avançada<br>📊 Gestão de Obras<br>📐 Projetos Urbanos";

    fecharPopup();
}

function fecharPopup(){
    document.getElementById("popup").style.display = "none";
}

function salvar(e){
    e.preventDefault();

    const tipo = document.getElementById("tipoRegistro").value;
    const registro = document.getElementById("registro").value;

    if(tipo !== "" && registro.length < 5){
        alert("Registro profissional inválido");
        return;
    }

    document.getElementById("resposta").innerHTML =
    "✅ Cadastro realizado com sucesso";

}
</script>

</body>
</html>

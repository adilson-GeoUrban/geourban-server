<script>

// 🔑 LOGIN
async function login() {

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  const status =
    document.getElementById("status");

  status.innerText = "Conectando...";

  // validação
  if (!email || !password) {

    status.innerText =
      "Preencha email e senha";

    return;

  }

  try {

    const res = await fetch("/login", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        email,
        password
      })

    });

    const data = await res.json();

    // ❌ login inválido
    if (!data.success) {

      status.innerText =
        "Erro login";

      return;

    }

    // ✅ salva token
    localStorage.setItem(
      "token",
      data.token
    );

    // ✅ salva usuário
    localStorage.setItem(
      "usuario",
      data.user.email
    );

    status.innerText =
      "Login realizado";

    // ✅ redireciona
    setTimeout(() => {

      window.location.href =
        "/ia";

    }, 500);

  } catch (e) {

    console.error(e);

    status.innerText =
      "Erro servidor";

  }

}

</script>

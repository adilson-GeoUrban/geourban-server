<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GeoUrban Login</title>

  <style>

    body {

      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;

    }

    .box {

      background: #222;
      padding: 30px;
      border-radius: 10px;
      width: 320px;

    }

    input {

      width: 100%;
      padding: 12px;
      margin-top: 10px;

      border: none;
      border-radius: 5px;

    }

    button {

      width: 100%;
      padding: 12px;

      margin-top: 15px;

      border: none;
      border-radius: 5px;

      background: #00aa88;
      color: white;

      cursor: pointer;

      font-size: 16px;

    }

    #status {

      margin-top: 15px;
      text-align: center;

    }

  </style>

</head>

<body>

  <div class="box">

    <h2>GeoUrban</h2>

    <input
      type="email"
      id="email"
      placeholder="Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Senha"
    >

    <button onclick="login()">
      Entrar
    </button>

    <div id="status"></div>

  </div>

  <script>

    async function login() {

      const email =
        document.getElementById("email").value.trim();

      const password =
        document.getElementById("password").value;

      const status =
        document.getElementById("status");

      status.innerText = "Conectando...";

      try {

        const res = await fetch("/login", {

          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify({
            email,
            password
          })

        });

        const data = await res.json();

        if (!data.success) {

          status.innerText = "Erro login";
          return;

        }

        localStorage.setItem(
          "token",
          data.token
        );

        localStorage.setItem(
          "usuario",
          data.user.email
        );

        status.innerText = "Login realizado";

        setTimeout(() => {

          window.location.href = "/ia";

        }, 500);

      } catch (e) {

        console.error(e);

        status.innerText = "Erro servidor";

      }

    }

  </script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban Plataforma</title>

<!-- Gantt -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt/dist/frappe-gantt.css">
<script src="https://cdn.jsdelivr.net/npm/frappe-gantt/dist/frappe-gantt.min.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0a0f1c;
    color:#fff;
    text-align:center;
}

.header {
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

input, button {
    padding:10px;
    margin:5px;
}

#log {
    background:#111;
    height:180px;
    overflow:auto;
    margin:20px;
    padding:10px;
    text-align:left;
    border-radius:10px;
}

.card {
    background:#16213e;
    margin:10px;
    padding:15px;
    border-radius:10px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
    margin:20px;
}

</style>
</head>

<body>

<div class="header">🧠 GeoUrban Sistema Integrado</div>

<input id="cmd" placeholder="Digite comando ou use voz">
<button onclick="executar()">Enviar</button>
<button onclick="voz()">🎙️ Voz</button>

<div id="log"></div>

<div class="grid">

<div class="card">📊 Dashboard em tempo real</div>

<div class="card">👷 Cadastro de Profissionais</div>

<div class="card">⚖️ IA Jurídica + Contábil</div>

<div class="card">💰 Pagamento Inteligente</div>

<div class="card">🗺️ Mapa Geoespacial</div>

<div class="card">🔐 Segurança Total</div>

<div class="card">🎓 Educação Automática</div>

</div>

<h3>📈 Planejamento</h3>
<svg id="gantt"></svg>

<script>

// LOG
function log(msg){
    document.getElementById("log").innerHTML += msg + "<br>";
}

// IA COMANDOS
function executar(){
    let cmd = document.getElementById("cmd").value.toLowerCase();

    log("👤 " + cmd);

    if(cmd.includes("relatorio")){
        log("📄 Gerando relatório...");
    }
    else if(cmd.includes("financeiro")){
        log("💰 Abrindo financeiro...");
    }
    else if(cmd.includes("mapa")){
        log("🗺️ Abrindo mapa...");
    }
    else if(cmd.includes("cadastro")){
        log("👷 Abrindo cadastro de profissionais...");
    }
    else if(cmd.includes("pagamento")){
        log("💳 Processando pagamento...");
    }
    else if(cmd.includes("curso")){
        log("🎓 Gerando curso automático...");
    }
    else if(cmd.includes("seguranca") || cmd.includes("hack")){
        log("🚨 ALERTA DE SEGURANÇA!");
    }
    else{
        log("🤖 IA analisando...");
    }
}

// VOZ
function voz(){
    const rec = new webkitSpeechRecognition();
    rec.lang = "pt-BR";

    rec.onresult = function(e){
        let texto = e.results[0][0].transcript;
        document.getElementById("cmd").value = texto;
        executar();
    };

    rec.start();
}

// GANTT
let tasks = [
    {id:'1', name:'Projeto', start:'2026-04-01', end:'2026-04-05', progress:20},
    {id:'2', name:'Execução', start:'2026-04-06', end:'2026-04-15', progress:10}
];

new Gantt("#gantt", tasks);

// MONITORAMENTO
setInterval(()=>{
    log("🛰️ Sistema monitorando...");
}, 10000);

</script>

BACKUP GEOURBAN V1
======================= -->

-->

</body>
</html>

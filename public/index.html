<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban - Comando Supremo</title>
<style>
body { font-family: Arial; background:#0d0d0d; color:white; }
.tela { display:none; padding:20px; }
.ativa { display:block; }
.card { max-width:700px; margin:auto; background:#1e1e1e; padding:20px; border-radius:10px; }
button { width:100%; padding:12px; margin-top:10px; background:#00c853; border:none; }
textarea, input, select { width:100%; padding:10px; margin-top:10px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="tela ativa">
<div class="card">
<h2>🔐 GeoUrban</h2>
<input placeholder="Usuário">
<input type="password" placeholder="Senha">
<button onclick="trocar('ia')">Entrar</button>
</div>
</div>

<!-- IA CENTRAL -->
<div id="ia" class="tela">
<div class="card">

<h2>👑 Assistente do Rei</h2>

<textarea id="entrada" placeholder="Descreva sua ordem..."></textarea>

<button onclick="executarOrdem()">Executar Ordem</button>

<div id="resposta"></div>

<hr>

<h3>🧠 Status das IAs</h3>
<pre id="status"></pre>

<h3>🛡️ Guardião</h3>
<p id="guardiao">VERIFICANDO...</p>

<button onclick="trocar('comando')">👑 Comando Central</button>

</div>
</div>

<!-- COMANDO CENTRAL -->
<div id="comando" class="tela">
<div class="card">
<h2>👑 Comando Central</h2>

<button onclick="window.open('/logs')">📜 Logs</button>
<button onclick="window.open('/backup')">💾 Backup</button>
<button onclick="window.open('/relatorio')">📊 Relatório</button>

<div id="controle"></div>

</div>
</div>

<script>

// ESTADO DAS IAs
let IAs = {
  Designer:true,
  Material:true,
  Juridica:true,
  Contabil:true,
  Defesa:true,
  Monitoramento:true,
  Relatorios:true
};

// TROCA TELA
function trocar(id){
  document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

// ATUALIZA STATUS
function atualizarStatus(){
  let txt="";
  for(let ia in IAs){
    txt += ia + ": " + (IAs[ia]?"ATIVA":"DESATIVADA")+"\n";
  }
  document.getElementById("status").innerText=txt;
}
setInterval(atualizarStatus,3000);
atualizarStatus();

// 👑 ASSISTENTE DO REI
function executarOrdem(){
  let entrada = document.getElementById("entrada").value.toLowerCase();
  let resposta = "👑 DECISÃO DO SISTEMA:\n\n";

  // 🔍 CHECAGEM OBRIGATÓRIA
  resposta += "✔ Verificando IAs...\n";

  for(let ia in IAs){
    if(!IAs[ia]){
      resposta += "❌ ERRO: IA "+ia+" desativada\n";
      document.getElementById("resposta").innerText=resposta;
      return;
    }
  }

  resposta += "✔ Todas IAs operacionais\n";

  // 🧠 DECISÃO INTELIGENTE
  if(entrada.includes("legal")){
    resposta += "\n⚖️ IA Jurídica acionada\n";
  }
  else if(entrada.includes("financeiro")){
    resposta += "\n💰 IA Contábil acionada\n";
  }
  else if(entrada.includes("projeto")){
    resposta += "\n📊 IA Designer acionada\n";
  }
  else{
    resposta += "\n🤖 IA Geral executando análise\n";
  }

  // 🛡️ VALIDAÇÃO FINAL
  resposta += "\n🛡️ Passando pelo Guardião...";
  resposta += "\n✅ Integridade confirmada";

  document.getElementById("resposta").innerText=resposta;
}

// 🛡️ GUARDIÃO STATUS
function guardiaoCheck(){
  fetch("/logs")
  .then(r=>r.text())
  .then(t=>{
    if(t.includes("ALERTA")){
      document.getElementById("guardiao").innerText="🚨 ALERTA";
    } else {
      document.getElementById("guardiao").innerText="✅ BLINDADO";
    }
  });
}
setInterval(guardiaoCheck,5000);
guardiaoCheck();

</script>

</body>
</html>

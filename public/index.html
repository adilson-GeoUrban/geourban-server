<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
}

.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
    padding: 40px;
}

/* topo */
.topo {
    margin-bottom: 30px;
}

/* FORM */
.form-box {
    background: rgba(0,0,0,0.6);
    padding: 25px;
    border-radius: 12px;
}

/* GRID 2 colunas */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.form-grid input,
.form-grid select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
}

button {
    grid-column: span 2;
    padding: 12px;
    background: #007bff;
    border: none;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
}

/* ÁREA INFERIOR (ASSISTENTE + CARTEIRA) */
.bottom-area {
    margin-top: 30px;
    display: flex;
    gap: 20px;
}

/* assistente agora embaixo */
.assistente {
    flex: 1;
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border-radius: 12px;
}

/* carteira digital (placeholder) */
.carteira {
    flex: 2;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 12px;
    min-height: 180px;
}
</style>

<div class="overlay">

    <!-- TOPO -->
    <div class="topo">
        <h1>🚀 GeoUrban</h1>
    </div>

    <!-- FORMULÁRIO -->
    <div class="form-box">
        <h2>Cadastro</h2>

        <form onsubmit="salvar(event)">
            <div class="form-grid">

                <input id="nome" placeholder="Nome completo">
                <input id="email" placeholder="Email">

                <select id="categoria">
                    <option value="">Categoria</option>
                    <option>Profissional</option>
                    <option>Estudante</option>
                    <option>Outro</option>
                </select>

                <select id="nivel">
                    <option value="">Nível</option>
                    <option>Técnico</option>
                    <option>Graduação</option>
                    <option>Mestrado</option>
                </select>

                <input id="profissao" placeholder="Profissão">
                <input id="especializacao" placeholder="Especialização">

                <select id="registroTipo">
                    <option value="">Registro</option>
                    <option>CREA</option>
                    <option>CAU</option>
                    <option>CRT</option>
                </select>

                <input id="registroNumero" placeholder="Número do registro">

                <select id="documentoTecnico">
                    <option value="">Documento Técnico</option>
                    <option>ART</option>
                    <option>RRT</option>
                    <option>TRT</option>
                </select>

                <input id="documentoNumero" placeholder="Número do documento">

                <input id="pais" placeholder="País">
                <input id="regiao" placeholder="Região">

                <select id="situacao">
                    <option value="">Situação</option>
                    <option>Ativo</option>
                    <option>Aposentado</option>
                </select>

                <button type="submit">Cadastrar</button>

            </div>
        </form>
    </div>

    <!-- PARTE INFERIOR -->
    <div class="bottom-area">

        <!-- ASSISTENTE -->
        <div class="assistente">
            <h3>🤖 Assistente</h3>
            <p>Estamos criando sua identidade digital.</p>
            <p>Dica: profissionais precisam de registro válido.</p>
        </div>

        <!-- CARTEIRA DIGITAL (VAI APARECER DEPOIS) -->
        <div class="carteira" id="carteira">
            <h3>📊 Carteira Digital</h3>
            <p>Seus dados aparecerão aqui após o cadastro.</p>
        </div>

    </div>

</div>

html, body {

/* FUNDO FIXO */
body::before {
    content: "";

    width: 100%;
    height: 100%;
    background: url("bg.jpg") no-repeat center center;
    background-size: cover;
    z-index: -1;
}

/* LOGIN */
.login-box {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 280px;
    background: rgba(0,0,0,0.85);
    padding: 20px;
    border-radius: 10px;
    color: white;
    z-index: 9999;
}

/* BOTÕES */
button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 5px;
}

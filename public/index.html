<script>
function salvar(e){
    e.preventDefault();

    // 🔹 CAPTURA
    const usuario = {
        nome: document.getElementById("nome").value,
        email: document.getElementById("email").value,
        categoria: document.getElementById("categoria").value,
        nivel: document.getElementById("nivel").value,
        faculdade: document.getElementById("faculdade").value,
        curso: document.getElementById("curso").value,
        profissao: document.getElementById("profissao").value,
        especializacao: document.getElementById("especializacao").value,
        registroTipo: document.getElementById("registroTipo").value,
        registroNumero: document.getElementById("registroNumero").value,
        documentoTecnico: document.getElementById("documentoTecnico").value,
        pais: document.getElementById("pais").value,
        regiao: document.getElementById("regiao").value,
        cep: document.getElementById("cep").value,
        telefoneMovel: document.getElementById("telefoneMovel").value,
        situacao: document.getElementById("situacao").value
    };

    // 🔹 VALIDAÇÃO PROFISSIONAL
    if(usuario.categoria === "Profissional"){
        if(!usuario.registroTipo || !usuario.registroNumero){
            alert("⚠️ Profissional precisa de registro válido");
            return;
        }
    }

    // 🔹 CARTÃO (PREVIEW)
    gerarCard(usuario);

    // 🔹 SALVAR (BASE LOCAL)
    localStorage.setItem("usuarioGeoUrban", JSON.stringify(usuario));

    // 🔹 FEEDBACK
    document.getElementById("resposta").innerHTML =
    "✅ Cadastro salvo e exibido com sucesso";
}

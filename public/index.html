<script>

// 🔑 LOGIN
async function login() {

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  const status =
    document.getElementById("status");

  status.innerText = "Conectando...";

  // validação
  if (!email || !password) {

    status.innerText =
      "Preencha email e senha";

    return;

  }

  try {

    const res = await fetch("/login", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        email,
        password
      })

    });

    const data = await res.json();

    // ❌ login inválido
    if (!data.success) {

      status.innerText =
        data.message || "Erro login";

      return;

    }

    // ✅ salva sessão
    localStorage.setItem(
      "token",
      data.token
    );

    localStorage.setItem(
      "usuario",
      data.user.email
    );

    status.innerText =
      "Login realizado";

    // ✅ redireciona
    setTimeout(() => {

      window.location.href =
        "/ia.html";

    }, 500);

  } catch (e) {

    console.error(e);

    status.innerText =
      "Erro servidor";

  }

}

// 🔒 VERIFICA SESSÃO
(function () {

  const token =
    localStorage.getItem("token");

  const user =
    localStorage.getItem("usuario");

  // evita bloquear tela login
  if (
    window.location.pathname === "/" ||
    window.location.pathname === "/index.html"
  ) {

    return;

  }

  // 🚫 sem sessão
  if (!token || !user) {

    window.location.replace("/");

    return;

  }

  console.log("🛡️ Sistema autenticado OK");

})();

</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoUrban</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1b5e20, #4caf50);
    color: white;
    text-align: center;
}

header {
    background: #2e7d32;
    padding: 20px;
    font-size: 22px;
}

.container {
    margin-top: 60px;
}

button {
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    width: 180px;
    background: white;
    color: #2e7d32;
    transition: 0.3s;
}

button:hover {
    background: #c8e6c9;
    transform: scale(1.05);
}
</style>
</head>

<body>

<header>🚀 GeoUrban</header>

<div class="container">
    <h2>Painel Inicial</h2>

    <button onclick="acao('Usuários')">👤 Usuários</button>
    <button onclick="acao('Financeiro')">💳 Financeiro</button>
    <button onclick="acao('Relatórios')">📊 Relatórios</button>
    <button onclick="acao('Configurações')">⚙️ Config</button>
</div>

<script>
function acao(nome) {
    alert("Abrindo: " + nome);
}
</script>

</body>
</html>

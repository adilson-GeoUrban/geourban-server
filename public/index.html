<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GeoUrban</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #020617;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .sidebar p {
      margin: 10px 0;
      opacity: 0.7;
    }

    .main {
      flex: 1;
      padding: 30px;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      flex: 1;
    }

    textarea {
      width: 100%;
      height: 100px;
      border-radius: 10px;
      padding: 10px;
      margin-top: 20px;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="layout">

  <div class="sidebar">
    <h2>🌍 GeoUrban</h2>
    <p>🏠 Dashboard</p>
    <p>📊 Relatórios</p>
    <p>🗺️ Mapas</p>
    <p>⚙️ Configurações</p>
  </div>

  <div class="main">

    <h1>Dashboard Urbano</h1>

    <div class="cards">
      <div class="card">
        <h2>130+</h2>
        <p>Relatórios</p>
      </div>

      <div class="card">
        <h2>95%</h2>
        <p>Precisão IA</p>
      </div>

      <div class="card">
        <h2>27</h2>
        <p>Usuários</p>
      </div>
    </div>

    <div style="margin-top:30px;">
      <canvas id="grafico"></canvas>
    </div>

    <textarea id="texto" placeholder="Descreva seu problema urbano..."></textarea>

    <button onclick="enviar()">Analisar com IA</button>

    <div class="result" id="resultado" style="display:none;"></div>

  </div>
</div>

<script>
const ctx = document.getElementById('grafico');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai'],
    datasets: [{
      label: 'Crescimento',
      data: [10, 20, 15, 30, 40],
      borderWidth: 2
    }]
  }
});
</script>

<script>
async function enviar() {
  const texto = document.getElementById("texto").value;

  if (!texto) {
    alert("Digite algo primeiro");
    return;
  }

  const res = await fetch("/consultoria", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ texto })
  });

  const data = await res.json();

  const box = document.getElementById("resultado");
  box.style.display = "block";
  box.innerHTML = `
    <b>Tipo:</b> ${data.tipo}<br>
    <b>Diagnóstico:</b> ${data.diagnostico}<br>
    <b>Sugestões:</b><br> - ${data.sugestoes.join("<br> - ")}<br>
    <b>Valor:</b> R$ ${data.valor_estimado}<br>
    <b>Risco:</b> ${data.risco}
  `;
}
</script>

</body>
</html>

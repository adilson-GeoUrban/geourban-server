<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban</title>

<style>

/* FUNDO CINEMATOGRÁFICO */
body{
    margin:0;
    font-family:Arial;
    color:#fff;

    background:
    linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1497366216548-37526070297c');

    background-size:cover;
    background-attachment:fixed;
}

/* HERO NETFLIX */
.hero{
    height:220px;
    position:relative;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:1s;
}

.slide.ativo{
    opacity:1;
}

.conteudo{
    position:absolute;
    bottom:20px;
    left:20px;
    font-size:26px;
    font-weight:bold;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:8px;
}

/* FORM */
.container{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    max-width:800px;
}

.full{ grid-column:1/3; }

input, select{
    padding:10px;
    width:100%;
    border-radius:5px;
    border:none;
}

/* BOTÃO */
button{
    padding:12px;
    background:#1e90ff;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#187bcd;
}

/* CARD */
.card{
    margin-top:20px;
    background:linear-gradient(135deg,#0b1a2a,#102a44);
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* CHAT */
.chat{
    position:fixed;
    right:20px;
    top:180px;
    width:250px;
    background:#0b1a2a;
    padding:15px;
    border-radius:10px;
}

</style>

</head>

<body>

<!-- HERO COM IMAGENS -->
<div class="hero">

    <div class="slide ativo" style="background-image:url('https://images.unsplash.com/photo-1503387762-592deb58ef4e');">
        <div class="conteudo">🚀 Bem-vindo à GeoUrban</div>
    </div>

    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab');">
        <div class="conteudo">🏗️ Conectando profissionais e cidades</div>
    </div>

    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1494526585095-c41746248156');">
        <div class="conteudo">📊 Gestão inteligente urbana</div>
    </div>

    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1509395176047-4a66953fd231');">
        <div class="conteudo">📎 Projetos e validação técnica</div>
    </div>

</div>

<div class="container">

<h2>Cadastro</h2>

<form class="grid" onsubmit="salvar(event)">

<input id="nome" placeholder="Nome completo" class="full" required>
<input id="email" placeholder="Email" class="full" required>

<select id="categoria">
<option value="">Categoria</option>
<option>Estudante</option>
<option>Profissional</option>
<option>Outro</option>
</select>

<select id="nivel">
<option value="">Nível</option>
<option>Graduação</option>
<option>Mestrado</option>
<option>Doutorado</option>
</select>

<input id="profissao" placeholder="Profissão">
<input id="especializacao" placeholder="Especialização">

<select id="registroTipo">
<option value="">Registro</option>
<option>CREA</option>
<option>CAU</option>
<option>CFT</option>
</select>

<input id="registroNumero" placeholder="Número do registro">

<select id="docTipo">
<option value="">Documento Técnico</option>
<option>ART</option>
<option>RRT</option>
<option>TRT</option>
</select>

<input id="docNumero" placeholder="Número do documento">

<input id="pais" placeholder="País">
<input id="regiao" placeholder="Região">

<select id="situacao" class="full">
<option value="">Situação</option>
<option>Ativo</option>
<option>Autônomo</option>
<option>Aposentado</option>
<option>Informal</option>
</select>

<button class="full">Cadastrar</button>

</form>

<div id="resposta"></div>
<div id="cardUsuario"></div>

</div>

<!-- CHAT -->
<div class="chat">
<h4>🤖 Assistente</h4>
<p id="chatMsg">Bem-vindo 👋</p>
</div>

<script>

/* SLIDES AUTOMÁTICOS */
let index = 0;
const slides = document.querySelectorAll(".slide");

setInterval(()=>{
    slides.forEach(s=>s.classList.remove("ativo"));
    index = (index + 1) % slides.length;
    slides[index].classList.add("ativo");
},4000);

/* CHAT INTELIGENTE */
function falar(msg){
    document.getElementById("chatMsg").innerText = msg;
}

setTimeout(()=>falar("Preencha seu cadastro 👇"),3000);
setTimeout(()=>falar("Escolha sua categoria"),6000);
setTimeout(()=>falar("Profissionais precisam de validação"),9000);
setTimeout(()=>falar("Estamos criando sua identidade digital"),12000);

/* ÁUDIO */
function audio(msg){
    const fala = new SpeechSynthesisUtterance(msg);
    speechSynthesis.speak(fala);
}

/* SALVAR */
function salvar(e){
    e.preventDefault();

    const usuario = {
        nome: nome.value,
        email: email.value,
        categoria: categoria.value,
        nivel: nivel.value,
        profissao: profissao.value,
        especializacao: especializacao.value,
        registroTipo: registroTipo.value,
        registroNumero: registroNumero.value,
        docTipo: docTipo.value,
        docNumero: docNumero.value,
        pais: pais.value,
        regiao: regiao.value,
        situacao: situacao.value
    };

    if(usuario.categoria === "Profissional"){
        if(!usuario.registroTipo || !usuario.registroNumero){
            alert("Informe registro profissional");
            return;
        }
        if(!usuario.docTipo || !usuario.docNumero){
            alert("Informe ART/RRT/TRT");
            return;
        }
    }

    localStorage.setItem("usuarioGeoUrban", JSON.stringify(usuario));

    document.getElementById("cardUsuario").innerHTML =
    `<div class="card">
        <h2>${usuario.nome}</h2>
        <p><b>Categoria:</b> ${usuario.categoria}</p>
        <p><b>Nível:</b> ${usuario.nivel}</p>
        <p><b>Profissão:</b> ${usuario.profissao}</p>
        <hr>
        <p><b>Registro:</b> ${usuario.registroTipo} ${usuario.registroNumero}</p>
        <p><b>Documento:</b> ${usuario.docTipo} ${usuario.docNumero}</p>
        <p><b>Local:</b> ${usuario.pais} - ${usuario.regiao}</p>
    </div>`;

    const msg = "Cadastro concluído. Bem-vindo à GeoUrban.";
    document.getElementById("resposta").innerHTML = msg;
    audio(msg);
}

</script>

</body>
</html>

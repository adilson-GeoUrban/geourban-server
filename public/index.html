<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GeoUrban IA</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* CHAT CENTRAL */
#chat {
  max-width: 600px;
  margin: 80px auto 10px;
  padding: 20px;
  background: rgba(0,0,0,0.7);
  border-radius: 10px;
  height: 300px;
  overflow-y: auto;
}

/* INPUT */
.input-area {
  text-align: center;
}

#input {
  padding: 12px;
  width: 60%;
  border: none;
  outline: none;
}

button {
  padding: 12px;
  background: #00c3ff;
  border: none;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Digite LOGIN ou CADASTRO">
  <button onclick="enviar()">Enviar</button>
</div>

<script src="app.js"></script>

</body>
</html>

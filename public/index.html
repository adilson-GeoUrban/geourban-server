<style>

/* FUNDO FULL */
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
    overflow:hidden;
}

/* BACKGROUND ANIMADO */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') center/cover no-repeat;
    filter:brightness(0.4);
    z-index:-1;
}

/* CONTAINER CENTRAL */
.container{
    display:flex;
    height:100vh;
}

/* CAIXA CADASTRO FLUTUANTE */
.chat-area{
    width:420px;
    max-width:90%;
    height:80vh;
    background:rgba(13,17,23,0.95);
    border-radius:15px;
    margin:auto;
    display:flex;
    flex-direction:column;
    padding:15px;
    box-shadow:0 0 30px rgba(0,0,0,0.8);
}

/* CHAT */
.chat-box{
    flex:1;
    overflow-y:auto;
    font-size:14px;
}

/* INPUT */
.input-area{
    display:flex;
    gap:5px;
}

input{
    flex:1;
    padding:10px;
    border-radius:5px;
    border:none;
}

/* CARD */
.card{
    background:#161b22;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

/* ASSISTENTE (FORA) */
.assistente{
    position:fixed;
    right:20px;
    bottom:20px;
    width:260px;
    background:rgba(0,0,0,0.7);
    padding:15px;
    border-radius:12px;
    backdrop-filter:blur(5px);
}

/* SLIDES */
.slides{
    position:fixed;
    top:20px;
    left:20px;
    width:300px;
}

.slide{
    background:rgba(0,0,0,0.6);
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    animation:fade 1s;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px)}
    to{opacity:1}
}

</style>

<div class="bg"></div>

<!-- SLIDES -->
<div class="slides" id="slides"></div>

<!-- CADASTRO IA -->
<div class="container">
    <div class="chat-area">

        <div id="mensagemIA"></div>

        <div class="chat-box" id="chat"></div>

        <div id="dados"></div>

        <div class="input-area">
            <input id="entrada" placeholder="Ex: sou engenheiro">
            <button onclick="enviar()">Enviar</button>
        </div>

    </div>
</div>

<!-- ASSISTENTE -->
<div class="assistente">
    👩‍💼 Assistente GeoUrban<br><br>
    Estou aqui para te ajudar no cadastro.<br>
    Vamos criar seu perfil profissional 🚀
</div>

<div id="ia" class="tela ativa">
<div class="card">
<h2>🤖 IA GeoUrban - Todas Ativas</h2>

<textarea id="entrada" placeholder="Digite seu projeto..."></textarea>

<button onclick="gerar()">Gerar Análise</button>
<button onclick="gerarPPT()">📊 Gerar PowerPoint</button>
<button onclick="gerarRelatorioIA()">📝 Relatório de Atividade</button>
<button onclick="baixarBackup()">💾 Baixar Backup</button>
<button onclick="verLogs()">📜 Ver Logs</button>

<div id="resposta"></div>
<hr>
<h3>🧠 Monitor do Sistema</h3>
<pre id="monitorIA"></pre>
</div>
</div>

<script>
// IAs
const IAs = [
  { nome: "Designer", status: "ATIVA" },
  { nome: "Material", status: "ATIVA" },
  { nome: "Monitoramento", status: "ATIVA" },
  { nome: "Relatórios", status: "ATIVA" },
  { nome: "Jurídica", status: "ATIVA" },
  { nome: "Contábil", status: "ATIVA" },
  { nome: "Exército de Defesa", status: "ATIVA" }
];

// Atualiza monitor
function atualizarMonitorIA() {
  let texto = "";
  IAs.forEach(ia => { texto += `${ia.nome}: ${ia.status}\n`; });
  document.getElementById("monitorIA").innerText = texto;
}
setInterval(atualizarMonitorIA, 5000);
atualizarMonitorIA();

function gerar(){document.getElementById("resposta").innerText="📊 Análise completa gerada.";}
function gerarPPT(){
  let texto=document.getElementById("entrada").value;
  fetch("/gerar-ppt",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({texto})})
  .then(res=>res.blob()).then(blob=>{let url=window.URL.createObjectURL(blob);let a=document.createElement("a");a.href=url;a.download="geourban.pptx";a.click();});
}
function gerarRelatorioIA(){
  let relatorio="📝 Relatório de Atividade\n\n";IAs.forEach(ia=>{relatorio+=`IA: ${ia.nome}\nStatus: ${ia.status}\n------------------\n`;});
  document.getElementById("resposta").innerText=relatorio;
  alert("Relatório gerado!");
}
function baixarBackup(){window.open("/backup","_blank");}
function verLogs(){window.open("/logs","_blank");}
</script>

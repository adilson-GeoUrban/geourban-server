<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>GeoUrban V2</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #020617;
            position: fixed;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #94a3b8;
            margin: 10px 0;
            text-decoration: none;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 20px;
        }

        /* HEADER COM IMAGEM */
        .header {
            width: 100%;
            height: 260px;

            background-image: url('dashboard.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 12px;
            overflow: hidden;
        }

        .header-overlay {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            text-align: center;
        }

        .header-overlay h1 {
            font-size: 36px;
            margin: 0;
        }

        .header-overlay p {
            margin-top: 10px;
            font-size: 16px;
            opacity: 0.9;
        }

        /* CARDS */
        .cards {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            flex: 1;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        /* BOX IA */
        .ai-box {
            margin-top: 20px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            border: none;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🌍 GeoUrban</h2>
        <a href="#">Dashboard</a>
        <a href="#">Relatórios</a>
        <a href="#">Mapas</a>
        <a href="#">Configurações</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">
            <div class="header-overlay">
                <h1>GeoUrban Intelligence</h1>
                <p>Plataforma de análise urbana com IA</p>
            </div>
        </div>

        <!-- CARDS -->
        <div class="cards">
            <div class="card">130+ Relatórios</div>
            <div class="card">95% Precisão IA</div>
            <div class="card">27 Usuários</div>
        </div>

        <!-- IA -->
        <div class="ai-box">
            <h3>Análise com IA</h3>
            <textarea placeholder="Descreva seu problema urbano..."></textarea>
            <button>Analisar</button>
        </div>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoUrban</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1b5e20, #4caf50);
    color: white;
}

/* TELAS */
.tela { display: none; padding: 20px; }
#login { display: flex; justify-content: center; align-items: center; height: 100vh; }
#home { display: none; text-align: center; }

/* BOX */
.box {
    background: rgba(0,0,0,0.4);
    padding: 25px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}

/* BOTÕES */
button {
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: white;
    color: #2e7d32;
}

/* CARD */
.card {
    background: rgba(0,0,0,0.4);
    padding: 20px;
    border-radius: 15px;
    max-width: 400px;
    margin: 20px auto;
}

.lista {
    background: white;
    color: black;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="box">
        <h2>🔐 GeoUrban</h2>
        <input id="user" placeholder="Usuário">
        <input id="pass" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
        <p id="erro" style="color:red;"></p>
    </div>
</div>

<!-- HOME -->
<div id="home" class="tela">
    <h2>Painel</h2>
    <button onclick="abrir('usuarios')">👤 Usuários</button>
    <button onclick="logout()">🚪 Sair</button>
</div>

<!-- USUÁRIOS -->
<div id="usuarios" class="tela">
    <button onclick="abrir('home')">⬅ Voltar</button>

    <div class="card">
        <h3>Cadastro</h3>
        <input id="nome" placeholder="Nome">
        <input id="email" placeholder="Email">
        <button onclick="salvar()">Salvar</button>
        <div id="lista" class="lista"></div>
    </div>
</div>

<script>
// LOGIN
function login() {
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pass").value.trim();

    document.getElementById("erro").innerText = "";

    if (u === "admin" && p === "1234") {
        sessionStorage.setItem("auth", "ok");
        iniciar();
    } else {
        document.getElementById("erro").innerText = "Login inválido";
    }
}

// INICIAR
function iniciar() {
    document.getElementById("login").style.display = "none";
    document.getElementById("home").style.display = "block";
    carregar();
}

// LOGOUT
function logout() {
    sessionStorage.clear();
    location.reload();
}

// TELAS
function abrir(t) {
    document.querySelectorAll(".tela").forEach(e => e.style.display = "none");
    document.getElementById(t).style.display = "block";
}

// SALVAR
function salvar() {
    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim();

    if (!nome || !email) {
        alert("Preencha todos os campos");
        return;
    }

    let lista = JSON.parse(localStorage.getItem("dados") || "[]");

    lista.push({ nome, email, data: new Date().toISOString() });

    localStorage.setItem("dados", JSON.stringify(lista));

    backup(lista);

    document.getElementById("nome").value = "";
    document.getElementById("email").value = "";

    carregar();
}

// BACKUP AUTOMÁTICO
function backup(dados) {
    const blob = new Blob([JSON.stringify(dados, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "backup-geourban.json";
    a.click();
}

// CARREGAR
function carregar() {
    let lista = JSON.parse(localStorage.getItem("dados") || "[]");

    let html = "";
    lista.forEach(u => {
        html += `<p>${u.nome} - ${u.email}</p>`;
    });

    const listaDiv = document.getElementById("lista");
    if (listaDiv) {
        listaDiv.innerHTML = html;
    }
}

// AUTO LOGIN
window.onload = function() {
    if (sessionStorage.getItem("auth") === "ok") {
        iniciar();
    }
}
</script>

</body>
</html>

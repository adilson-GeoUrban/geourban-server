<script>
// 🤖 ROBÔ DE VERIFICAÇÃO GEOURBAN
(function () {
  try {
    let user = localStorage.getItem("usuario");

    // 🔧 Corrige caso esteja salvo errado (JSON antigo)
    if (!user) {
      const oldUser = localStorage.getItem("user");

      if (oldUser) {
        try {
          const parsed = JSON.parse(oldUser);
          user = parsed.email || oldUser;
        } catch {
          user = oldUser;
        }

        localStorage.setItem("usuario", user);
      }
    }

    // 🚫 Se não houver usuário → volta pro login
    if (!user) {
      console.warn("🔒 Usuário não encontrado, redirecionando...");
      window.location.href = "/login.html";
      return;
    }

    // 🧹 Limpa resíduos antigos que causam erro
    localStorage.removeItem("token");
    localStorage.removeItem("auth");
    localStorage.removeItem("session");

    console.log("🤖 Sistema estabilizado:", user);

  } catch (e) {
    console.error("Erro no robô de verificação:", e);
    window.location.href = "/login.html";
  }
})();
</script>
<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const status = document.getElementById("status");

  if (!email || !password) {
    status.innerText = "⚠️ Preencha todos os campos";
    return;
  }

  status.innerText = "⏳ Conectando...";

  try {
    const res = await fetch("https://geourban-server-production.up.railway.app/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!data.success) {
      status.innerText = "❌ Credenciais inválidas";
      return;
    }

    // 🔥 PADRÃO CORRETO
    localStorage.setItem("usuario", data.user.email);
    localStorage.setItem("user", data.user.email);

    status.innerText = "✅ Login OK";

    // 🔥 REDIRECIONAMENTO CORRETO
    setTimeout(() => {
      window.location.href = "/painel.html";
    }, 800);

  } catch (err) {
    status.innerText = "❌ Erro ao conectar servidor";
  }
}
</script>

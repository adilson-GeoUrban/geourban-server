<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const status = document.getElementById("status");

  if (!email || !password) {
    status.innerText = "⚠️ Preencha todos os campos";
    return;
  }

  status.innerText = "⏳ Conectando...";

  try {
    const res = await fetch("https://geourban-server-production.up.railway.app/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!data.success) {
      status.innerText = "❌ Credenciais inválidas";
      return;
    }

    localStorage.setItem("user", JSON.stringify(data.user));

    status.innerText = "✅ Login OK";

  } catch (err) {
    status.innerText = "❌ Erro ao conectar servidor";
  }
}
</script>

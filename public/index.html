<!-- Tela IA com monitor completo -->
<div id="ia" class="tela">
  <div class="card">
    <h2>🤖 IA GeoUrban - Todas Ativas</h2>

    <textarea id="entrada" placeholder="Digite seu projeto..."></textarea>
    <button onclick="gerar()">Gerar Análise</button>
    <button onclick="gerarPPT()">📊 Gerar PowerPoint</button>
    <button onclick="gerarRelatorioIA()">📝 Relatório de Atividade</button>

    <div id="resposta"></div>
    <hr>
    <h3>🧠 Monitor do Sistema</h3>
    <pre id="monitorIA"></pre>
  </div>
</div>

<script>
// Definição das IAs
const IAs = [
  { nome: "Designer", status: "ATIVA", funcao: "Analisa projeto e gera estrutura" },
  { nome: "Material", status: "ATIVA", funcao: "Gera PDFs, guias e vídeos" },
  { nome: "Monitoramento", status: "ATIVA", funcao: "Verifica status do sistema e alertas" },
  { nome: "Relatórios", status: "ATIVA", funcao: "Gera PowerPoint e logs" },
  { nome: "Jurídica", status: "ATIVA", funcao: "Analisa aspectos legais" },
  { nome: "Contábil", status: "ATIVA", funcao: "Gera análises financeiras e relatórios" },
  { nome: "Exército de Defesa", status: "ATIVA", funcao: "Verifica conformidade de segurança" }
];

// Atualiza monitor em tempo real
function atualizarMonitorIA() {
  let texto = "";
  IAs.forEach(ia => {
    texto += `${ia.nome}: ${ia.status} → ${ia.funcao}\n`;
  });
  document.getElementById("monitorIA").innerText = texto;
}

// Chama atualização a cada 5s
setInterval(atualizarMonitorIA, 5000);
atualizarMonitorIA();

// IA Designer
function gerar() {
  const texto = document.getElementById("entrada").value;
  document.getElementById("resposta").innerHTML =
    "📊 Análise realizada:\n" + texto + "\n✔ Todas IAs identificadas e processando conteúdo.";
}

// IA Relatórios - PowerPoint
function gerarPPT() {
  const texto = document.getElementById("entrada").value;
  fetch("/gerar-ppt", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ texto })
  })
  .then(res => res.blob())
  .then(blob => {
    let url = window.URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "geourban.pptx";
    a.click();
  });
}

// 🔹 NOVO: Relatório detalhado de todas as IAs
function gerarRelatorioIA() {
  let relatorio = "📝 RELATÓRIO DE ATIVIDADE DAS IAs\n\n";
  IAs.forEach(ia => {
    relatorio += `IA: ${ia.nome}\nStatus: ${ia.status}\nFunção: ${ia.funcao}\n----------------------\n`;
  });

  // Exibe na tela
  document.getElementById("resposta").innerText = relatorio;

  // Pode gerar PDF se integrado
  alert("Relatório gerado! Você pode baixar ou enviar para auditoria.");
}
</script>

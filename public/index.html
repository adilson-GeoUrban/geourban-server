<script>
document.getElementById("entrar").addEventListener("click", function() {
    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;
    const mensagem = document.getElementById("mensagem");

    if(usuario === "Admin" && senha === "1234") {

        // ✅ SALVA ACESSO
        localStorage.setItem("usuario", usuario);
        localStorage.setItem("acesso_emergencia", "true");
        localStorage.setItem("chave", "geo123");

        mensagem.style.color = "#00ff00";
        mensagem.innerText = "✅ Acesso liberado! Redirecionando...";

        // 🚀 REDIRECIONA PARA SISTEMA
        setTimeout(() => {
            window.location.href = "/";
        }, 1000);

    } else {
        mensagem.style.color = "#ff5555";
        mensagem.innerText = "❌ Usuário ou senha incorretos!";
    }
});
</script>

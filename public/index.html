<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
}

.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
    padding: 40px;
}

/* TOPO */
.topo {
    margin-bottom: 20px;
}

/* FORM ESQUERDA */
.form-box {
    width: 350px; /* largura controlada */
}

/* CAMPOS EM CASCATA */
.form-box input,
.form-box select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: none;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    background: #007bff;
    border: none;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
}

/* BOTÃO CARTEIRA NO RODAPÉ */
.footer {
    position: fixed;
    bottom: 20px;
    left: 40px;
}

.footer button {
    width: auto;
    padding: 10px 20px;
}
</style>

<div class="overlay">

    <div class="topo">
        <h1>🚀 GeoUrban</h1>
    </div>

    <div class="form-box">
        <h2>Cadastro</h2>

        <form onsubmit="salvar(event)">

            <input id="nome" placeholder="Nome completo">
            <input id="email" placeholder="Email">

            <select id="categoria">
                <option value="">Categoria</option>
                <option>Profissional</option>
                <option>Estudante</option>
                <option>Outro</option>
            </select>

            <select id="nivel">
                <option value="">Nível</option>
                <option>Técnico</option>
                <option>Graduação</option>
                <option>Mestrado</option>
            </select>

            <input id="profissao" placeholder="Profissão">
            <input id="especializacao" placeholder="Especialização">

            <select id="registroTipo">
                <option value="">Registro</option>
                <option>CREA</option>
                <option>CAU</option>
                <option>CRT</option>
            </select>

            <input id="registroNumero" placeholder="Número do registro">

            <select id="documentoTecnico">
                <option value="">Documento Técnico</option>
                <option>ART</option>
                <option>RRT</option>
                <option>TRT</option>
            </select>

            <input id="documentoNumero" placeholder="Número do documento">

            <input id="pais" placeholder="País">
            <input id="regiao" placeholder="Região">

            <select id="situacao">
                <option value="">Situação</option>
                <option>Ativo</option>
                <option>Aposentado</option>
            </select>

            <button type="submit">Cadastrar</button>

        </form>
    </div>

    <!-- RODAPÉ -->
    <div class="footer">
        <button onclick="abrirCarteira()">📊 Carteira Digital</button>
    </div>

</div>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel GeoUrban</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #0f0;
    padding: 20px;
}

.box {
    background: #000;
    padding: 15px;
    margin: 10px 0;
    border: 1px solid #0f0;
}
</style>
</head>

<body>

<h2>🧠 IA DESIGNER — PAINEL ATIVO</h2>

<div class="box">
    👤 Usuário: <span id="user"></span>
</div>

<div class="box">
    📡 Status do sistema: <span id="status">carregando...</span>
</div>

<div class="box">
    📜 Histórico IA:
    <pre id="historico"></pre>
</div>

<script>

// 🔐 PROTEÇÃO
if(localStorage.getItem("logado") !== "true") {
    window.location.href = "/";
}

// 👤 MOSTRA USUÁRIO
document.getElementById("user").innerText = localStorage.getItem("usuario");

// 🔁 IA DESIGNER (VISÍVEL)
async function atualizar() {

    try {
        const status = await fetch("/ia/status").then(r => r.json());
        document.getElementById("status").innerText = status.status;

        const hist = await fetch("/ia/historico").then(r => r.json());
        document.getElementById("historico").innerText = JSON.stringify(hist, null, 2);

    } catch (e) {
        document.getElementById("status").innerText = "erro";
    }

}

// 🔄 LOOP CONTROLADO (IA EM AÇÃO)
setInterval(atualizar, 3000);

</script>

</body>
</html>

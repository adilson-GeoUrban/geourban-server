<script>
document.getElementById("entrar").addEventListener("click", function() {
    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;
    const mensagem = document.getElementById("mensagem");

    if(usuario === "Admin" && senha === "1234") {

        // ✅ FEEDBACK VISUAL
        mensagem.style.color = "#00ff00";
        mensagem.innerText = "✅ Acesso liberado";

        // ✅ SALVA SESSÃO
        localStorage.setItem("logado", "true");
        localStorage.setItem("usuario", usuario);

        // ❌ REMOVE ALERT (TRAVA O FLUXO)
        // alert("Acesso liberado em modo de emergência!");

        // 🚀 AÇÃO REAL (REDIRECIONA)
        window.location.href = "/";

    } else {
        mensagem.style.color = "#ff5555";
        mensagem.innerText = "❌ Usuário ou senha incorretos!";
    }
});
</script>

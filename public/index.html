<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body {display:flex;background:#0f172a;color:white;}

.sidebar {
  width:220px;
  height:100vh;
  background:#020617;
  padding:20px;
}

.sidebar h2 {margin-bottom:30px;}
.sidebar a {display:block;margin:10px 0;color:#94a3b8;text-decoration:none;}
.sidebar a:hover {color:white;}

.main {flex:1;padding:30px;}

.cards {display:flex;gap:20px;margin-bottom:30px;}
.card {flex:1;background:#1e293b;padding:20px;border-radius:12px;}
.card h1 {font-size:28px;}

.grid {display:flex;gap:20px;}

.chart-box {
  flex:2;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

.ai-box {
  flex:1;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

textarea {
  width:100%;
  height:100px;
  border-radius:8px;
  border:none;
  padding:10px;
  margin-top:10px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.result {margin-top:10px;font-size:13px;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🌍 GeoUrban</h2>
  <a href="#">Dashboard</a>
  <a href="#">Relatórios</a>
  <a href="#">Mapas</a>
  <a href="#">Configurações</a>
</div>

<div class="main">
  <h1>Dashboard Urbano</h1>

  <div class="cards">
    <div class="card">
      <h1>130+</h1>
      <p>Relatórios</p>
    </div>
    <div class="card">
      <h1>95%</h1>
      <p>Precisão IA</p>
    </div>
    <div class="card">
      <h1>27</h1>
      <p>Usuários</p>
    </div>
  </div>

  <div class="grid">
    
    <div class="chart-box">
      <canvas id="grafico"></canvas>
    </div>

    <div class="ai-box">
      <h3>Consultoria IA</h3>
      <textarea id="texto" placeholder="Descreva problema urbano..."></textarea>
      <button onclick="enviar()">Analisar</button>
      <div class="result" id="resultado"></div>
    </div>

  </div>
</div>

<script>
const ctx = document.getElementById('grafico');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Jan','Fev','Mar','Abr','Mai'],
    datasets: [{
      label: 'Crescimento',
      data: [10,20,15,30,40],
      borderWidth: 2
    }]
  }
});

async function enviar() {
  const texto = document.getElementById("texto").value;

  const res = await fetch("/consultoria", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ texto })
  });

  const data = await res.json();

  document.getElementById("resultado").innerHTML = `
  <b>Tipo:</b> ${data.tipo}<br>
  <b>Diagnóstico:</b> ${data.diagnostico}<br>
  <b>Sugestões:</b> ${data.sugestoes.join(", ")}
  `;
}
</script>

</body>
</html>
</html>

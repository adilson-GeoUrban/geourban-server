<script>
// =======================
// 🤖 IA HUMANIZADA + ACESSÍVEL
// =======================

function log(msg) {
    const el = document.getElementById("log");
    el.innerHTML += msg + "<br>";
    el.scrollTop = el.scrollHeight;
}

// estado do usuário
let perfil = {
    acessibilidade: null
};

// 🧠 BOAS-VINDAS HUMANIZADA
window.onload = () => {
    log("👋 Olá, seja bem-vindo ao GeoUrban");
    setTimeout(() => {
        log("💬 Vou te acompanhar passo a passo.");
    }, 800);

    setTimeout(() => {
        log("♿ Você possui alguma limitação?");
        log("1️⃣ Visual");
        log("2️⃣ Auditiva");
        log("3️⃣ Mobilidade");
        log("4️⃣ Nenhuma");
        log("👉 Digite o número abaixo:");
        ativarEntrada();
    }, 1500);
};

// 🧾 CAPTURA RESPOSTA
function ativarEntrada() {
    const input = document.getElementById("cpf");
    input.placeholder = "Digite 1, 2, 3 ou 4";
    input.focus();

    input.onkeydown = function(e) {
        if (e.key === "Enter") {
            tratarResposta(input.value);
            input.value = "";
        }
    };
}

// 🧠 TRATAR RESPOSTA
function tratarResposta(resposta) {
    switch(resposta.trim()) {
        case "1":
            perfil.acessibilidade = "visual";
            log("👁️ Modo visual ativado (alto contraste)");
            document.body.style.filter = "contrast(1.4)";
            break;

        case "2":
            perfil.acessibilidade = "auditiva";
            log("🔊 Modo auditivo ativado (mensagens visuais reforçadas)");
            break;

        case "3":
            perfil.acessibilidade = "mobilidade";
            log("🦽 Modo mobilidade ativado (botões maiores)");
            document.querySelectorAll("button").forEach(b => {
                b.style.padding = "15px";
                b.style.fontSize = "18px";
            });
            break;

        case "4":
            perfil.acessibilidade = "nenhuma";
            log("👍 Perfeito, seguimos normalmente");
            break;

        default:
            log("❌ Opção inválida, tente novamente");
            return;
    }

    continuarFluxo();
}

// 🔄 CONTINUAR PARA LOGIN
function continuarFluxo() {
    setTimeout(() => {
        log("🔐 Agora vamos acessar ou criar sua conta.");
        document.getElementById("cpf").placeholder = "Digite seu CPF";
        document.getElementById("senha").placeholder = "Digite sua senha";
    }, 1000);
}

// =======================
// 🔐 CADASTRO
// =======================
async function cadastrar() {
    log("📨 Enviando cadastro...");

    const cpf = document.getElementById("cpf").value;
    const senha = document.getElementById("senha").value;

    try {
        const res = await fetch("/cadastro", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ cpf, senha })
        });

        const data = await res.json();

        if (data.ok) {
            log("✅ Cadastro realizado com segurança");
        } else {
            log("⚠️ " + data.erro);
        }

    } catch (e) {
        log("❌ Erro de conexão");
    }
}

// =======================
// 🔐 LOGIN
// =======================
async function login() {
    log("🔑 Tentando login...");

    const cpf = document.getElementById("cpf").value;
    const senha = document.getElementById("senha").value;

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ cpf, senha })
        });

        const data = await res.json();

        if (data.ok) {
            localStorage.setItem("token", data.token);
            log("✅ Login autorizado — acesso liberado");
        } else {
            log("❌ Credenciais inválidas");
        }

    } catch (e) {
        log("❌ Falha no servidor");
    }
}
</script>

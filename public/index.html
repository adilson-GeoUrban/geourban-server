<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoUrban - Painel Administrativo</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
    h1 { color: #2e7d32; }
    button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    #status { margin-top: 15px; font-weight: bold; }
</style>
</head>
<body>

<h1>GeoUrban - Painel Administrativo</h1>
<p>Controle rápido das Bandejas e backups</p>

<button onclick="salvarB1()">💾 Salvar Bandeja 1</button>
<button onclick="salvarB2()">💾 Salvar Bandeja 2</button>
<button onclick="salvarTudo()">💾 Salvar Tudo</button>

<p id="status">Status: aguardando ação...</p>

<script>
// Função para Salvar Bandeja 1
async function salvarB1() {
    const dados = { usuarios: ["Admin"], configuracoes: { tema: "claro" }, env: 1 };
    await enviar("/salvar-tudo", dados);
}

// Função para Salvar Bandeja 2
async function salvarB2() {
    const dados = { laboratorio: "ativo", projetos: ["geo1","geo2"] };
    await enviar("/salvar-b2", dados);
}

// Função para Salvar Tudo (Bandeja 1 + 2)
async function salvarTudo() {
    const dados = { usuarios: ["Admin"], configuracoes: { tema: "claro" }, env: 2 };
    await enviar("/salvar-tudo", dados);
}

// Função genérica de envio
async function enviar(url, dados) {
    try {
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dados)
        });
        const resultado = await response.json();
        document.getElementById("status").innerText =
            `✅ ${resultado.mensagem} (ambiente ${resultado.ambiente})`;
    } catch (erro) {
        document.getElementById("status").innerText =
            `❌ Erro: ${erro.message}`;
    }
}
</script>

</body>
</html>

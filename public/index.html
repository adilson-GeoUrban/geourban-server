<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoUrban</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

/* INTRO */
#intro {
 position:fixed; top:0; left:0; width:100%; height:100%;
 background:black; display:flex; flex-direction:column;
 align-items:center; justify-content:center;
 z-index:9999; text-align:center;
}

/* CHAT */
#chat {
 position:fixed; bottom:10px; right:10px;
 width:320px; background:white; color:black;
 border-radius:10px; padding:10px;
 box-shadow:0 0 10px rgba(0,0,0,0.5);
}

#mensagens { height:200px; overflow:auto; font-size:14px; }

button { padding:8px; margin-top:5px; }
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div id="slide"></div>

    <audio id="audio" loop>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <div style="margin-top:20px;">
        ⚠️ LGPD: seus dados são protegidos e usados apenas na plataforma.<br><br>
        <button onclick="iniciarSistema()">Aceito e continuar</button>
    </div>
</div>

<!-- CHAT -->
<div id="chat">
    <div id="mensagens"></div>
    <input id="input" placeholder="Digite..." style="width:70%">
    <button onclick="enviar()">OK</button>
</div>

<script>
// ================= SLIDES =================
const slides = [
"🌍 GeoUrban",
"🚀 Gestão Inteligente",
"🔐 Segurança Total",
"🤖 IA Luiza",
"📊 Controle Completo"
];

let i=0;
setInterval(()=>{
 document.getElementById("slide").innerText = slides[i];
 i=(i+1)%slides.length;
},2000);


// ================= ESTADO =================
let liberado = false;
let etapa = 0;


// ================= INICIO =================
function iniciarSistema(){
 liberado = true;

 document.getElementById("intro").style.display="none";

 document.getElementById("audio").play().catch(()=>{});

 mostrar("Luiza: Sistema iniciado.");
 mostrar("Luiza: Você possui limitação visual, auditiva ou motora?");
}


// ================= CHAT =================
function enviar(){
 if(!liberado){
  mostrar("Luiza: Aceite a LGPD.");
  return;
 }

 const input = document.getElementById("input");
 const msg = input.value.toLowerCase();

 mostrar("Você: "+msg);

 // FLUXO PERFIL
 if(etapa===0){
  registrar("Limitacoes: "+msg);
  mostrar("Luiza: Qual seu nível de escolaridade?");
  etapa++;
 }
 else if(etapa===1){
  registrar("Escolaridade: "+msg);
  mostrar("Luiza: Qual sua profissão?");
  etapa++;
 }
 else if(etapa===2){
  registrar("Profissao: "+msg);
  mostrar("Luiza: Perfil registrado.");
  mostrar("Luiza: Digite LOGIN ou CADASTRO.");
  etapa++;
 }
 else{
  if(msg.includes("login")){
   registrar("Login solicitado");
   login();
  }
  else if(msg.includes("cadastro")){
   registrar("Cadastro solicitado");
   cadastro();
  }
  else{
   mostrar("Luiza: Digite LOGIN ou CADASTRO.");
  }
 }

 input.value="";
}


// ================= BACKEND =================
function login(){
 fetch("/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({usuario:"admin",senha:"123"})
 })
 .then(r=>r.json())
 .then(()=>{
  mostrar("Luiza: Login executado.");
  registrar("Login executado");
 });
}

function cadastro(){
 fetch("/cadastro",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({usuario:"admin",senha:"123"})
 })
 .then(r=>r.json())
 .then(()=>{
  mostrar("Luiza: Cadastro executado.");
  registrar("Cadastro executado");
 });
}


// ================= AUDITORIA =================
function registrar(evento){
 fetch("/log",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({evento})
 });
}


// ================= UI =================
function mostrar(txt){
 const d=document.getElementById("mensagens");
 d.innerHTML+="<p>"+txt+"</p>";
 d.scrollTop=d.scrollHeight;
}
</script>

</body>
</html>
<script>
// ================= CONTROLE DE INATIVIDADE =================

let tempoInatividade;
let avisoEnviado = false;

// ⏱️ tempo (ajuste se quiser)
const LIMITE = 60000;       // 60s sem interação
const AVISO = 45000;        // aviso aos 45s

function resetarInatividade(){
    clearTimeout(tempoInatividade);
    avisoEnviado = false;

    tempoInatividade = setTimeout(() => {
        encerrarSessao();
    }, LIMITE);

    // aviso antes de encerrar
    setTimeout(() => {
        if(!avisoEnviado){
            mostrar("Luiza: Sem interação. Atendimento será encerrado em breve.");
            registrar("Aviso de inatividade");
            avisoEnviado = true;
        }
    }, AVISO);
}


// ================= ENCERRAMENTO =================
function encerrarSessao(){

    registrar("Sessão encerrada por inatividade");

    mostrar("Luiza: Atendimento encerrado por falta de interação.");

    // bloqueia sistema
    liberado = false;

    // desativa chat
    const chat = document.getElementById("chat");
    if(chat){
        chat.style.opacity = "0.5";
    }

    // limpa input
    const input = document.getElementById("input");
    if(input){
        input.disabled = true;
    }
}


// ================= MONITORA INTERAÇÃO =================
document.addEventListener("click", resetarInatividade);
document.addEventListener("keypress", resetarInatividade);

// inicia contagem ao liberar sistema
const oldIniciar = iniciarSistema;
iniciarSistema = function(){
    oldIniciar();
    resetarInatividade();
};
const LIMITE = 120000; // 2 minutos
const AVISO = 90000;   // aviso aos 1:30
</script>

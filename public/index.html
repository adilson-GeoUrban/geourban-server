<script>
// 🔐 VERIFICAÇÃO INICIAL
const token = localStorage.getItem("token");
const user = localStorage.getItem("usuario");

// 🚫 BLOQUEIA ACESSO SEM LOGIN
if (!token || !user) {
  alert("Acesso não autorizado 🔒");
  window.location.href = "login.html";
}

// 🔎 VALIDA TOKEN NO BACKEND (SEGURANÇA REAL)
fetch("https://SEU-LINK-RAILWAY/protegido", {
  headers: {
    "Authorization": token
  }
})
.then(res => {
  if (res.status !== 200) {
    localStorage.clear();
    window.location.href = "login.html";
  }
});

// 🚀 INICIALIZAÇÃO DO SISTEMA
document.addEventListener("DOMContentLoaded", () => {

  let camadas = JSON.parse(localStorage.getItem("camadas") || "[]");

  // padrão inicial
  if (!camadas || camadas.length === 0) {
    camadas = ["educacao"];
    localStorage.setItem("camadas", JSON.stringify(camadas));
  }

  // usuário na tela
  document.getElementById("usuario").innerText = "Usuário: " + user;

  const painel = document.getElementById("painel");

  const mapa = {
    educacao: "📚 Educação",
    cursos: "🎓 Cursos",
    simulacoes: "🧪 Simulações",
    consultoria: "🧠 Consultoria",
    clientes: "👥 Clientes",
    cadastro_tecnico: "📄 Cadastro Técnico",
    loja: "🛒 Loja",
    gestao: "🏛️ Gestão",
    auditoria: "🔍 Auditoria",
    relatorios: "📊 Relatórios",
    controle: "⚙️ Controle"
  };

  function abrirModulo(nome) {
    alert("Abrindo módulo: " + nome);
  }

  camadas.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = mapa[c] || c;

    div.onclick = () => abrirModulo(mapa[c] || c);

    painel.appendChild(div);

    if (i === 0) {
      setTimeout(() => {
        abrirModulo(mapa[c] || c);
      }, 800);
    }
  });

});
</script>

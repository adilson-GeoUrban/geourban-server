<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban Plataforma</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0f1c;
    color:#fff;
}

.container{
    display:flex;
}

.sidebar{
    width:220px;
    height:100vh;
    background:#111827;
    padding:20px;
    position:fixed;
}

.content{
    margin-left:240px;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:10px;
    cursor:pointer;
}

.panel{
    display:none;
}

.panel.active{
    display:block;
}

button{
    padding:10px;
    margin-top:10px;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
}

#log{
    background:#000;
    margin-top:20px;
    padding:10px;
    height:120px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>🧠 GeoUrban</h2>
</div>

<div class="content">

<h1>🚀 Plataforma</h1>

<div id="home" class="panel active">
<div class="grid">
<div class="card" onclick="abrir('entrada')">🌐 Cadastro</div>
</div>
</div>

<div id="entrada" class="panel">

<button onclick="voltar()">⬅ Voltar</button>

<h2>Cadastro do Usuário</h2>

<form onsubmit="salvarEntrada(event)">

<input type="text" placeholder="Nome completo" required>
<input type="email" placeholder="Email" required>

<select id="situacao" required>
<option value="">Situação</option>
<option value="formacao">Em formação</option>
<option value="ativo">Ativo regular</option>
<option value="autonomo">Autônomo</option>
<option value="aposentado">Aposentado</option>
</select>

<select id="registroTipo">
<option value="">Registro</option>
<option>CREA</option>
<option>CAU</option>
<option>CFT</option>
</select>

<input id="registroNumero" placeholder="Número registro">

<button type="submit">Cadastrar</button>

</form>

<div id="resposta"></div>

</div>

<div id="log"></div>

</div>

<script>

function abrir(id){
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function voltar(){
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('home').classList.add('active');
}

function salvarEntrada(e){
    e.preventDefault();

    const situacao = document.getElementById("situacao").value;
    const registro = document.getElementById("registroNumero").value;

    if(situacao === "ativo" && (!registro || registro.length < 3)){
        alert("Registro obrigatório para ativo");
        return;
    }

    document.getElementById("resposta").innerHTML =
    "✅ Cadastro OK";

    registrar("Cadastro realizado");
}

let ultimo = "";

function registrar(msg){
    if(msg !== ultimo){
        document.getElementById("log").innerHTML += msg + "<br>";
        ultimo = msg;
    }
}

</script>

</body>
</html>

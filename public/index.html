<style>
body {
    margin: 0;
    font-family: Arial;
    background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') no-repeat center center/cover;
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

/* IA ESQUERDA */
.ia-box {
    position: fixed;
    left: 0;
    top: 0;
    width: 300px;
    height: 100%;
    background: rgba(0,0,0,0.85);
    padding: 20px;
    color: #fff;
    overflow-y: auto;
}

.ia-box input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

/* CADASTRO CENTRAL */
.cadastro-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    background: rgba(0,0,0,0.8);
    padding: 25px;
    border-radius: 12px;
}

.cadastro-box input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

/* SLIDES DIREITA */
.slides {
    position: fixed;
    right: 0;
    top: 0;
    width: 300px;
    height: 100%;
    overflow: hidden;
}

.slide {
    height: 100%;
    display: none;
    color: #fff;
    padding: 20px;
}

.slide.active {
    display: block;
}
</style>

<div class="overlay"></div>

<!-- IA -->
<div class="ia-box">
    <h3>🤖 Assistente</h3>
    <p>Bem-vindo à GeoUrban</p>
    <p>Vamos criar seu perfil profissional 🚀</p>

    <input placeholder="Digite aqui..." />
</div>

<!-- CADASTRO -->
<div class="cadastro-box">
    <h2>Cadastro</h2>

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">

    <select id="categoria">
        <option>Profissional</option>
        <option>Estudante</option>
    </select>

    <select id="nivel">
        <option>Básico</option>
        <option>Mestrado</option>
    </select>

    <input id="profissao" placeholder="Profissão">
    <input id="especializacao" placeholder="Especialização">

    <select id="registroTipo">
        <option>CREA</option>
        <option>CAU</option>
    </select>

    <input id="registroNumero" placeholder="Número">

    <button onclick="salvar()">Cadastrar</button>
</div>

<!-- SLIDES -->
<div class="slides">
    <div class="slide active">🚀 Conecte-se com profissionais</div>
    <div class="slide">📊 Projetos técnicos</div>
    <div class="slide">📎 Upload de ART/RRT</div>
</div>

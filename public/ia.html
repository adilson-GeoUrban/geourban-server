<script>
document.getElementById("entrar").addEventListener("click", function() {
    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;

    // Login dummy temporário
    if(usuario === "admin" && senha === "1234") {
        alert("Senha correta! Agora confirme o código de email/SMS.");
        document.getElementById("verificacao").style.display = "block";
    } else {
        alert("Usuário ou senha incorretos!");
    }
});

document.getElementById("confirmar").addEventListener("click", function() {
    const codigoEmail = document.getElementById("codigoEmail").value;
    const codigoSMS = document.getElementById("codigoSMS").value;

    // Verificação dummy temporária
    if(codigoEmail === "1111" && codigoSMS === "2222") {
        alert("Login master confirmado! Bem-vindo ao GeoUrban.");
        // Aqui você pode redirecionar ou ativar Calcenter/IA
        document.getElementById("login-flutuante").style.display = "none";
    } else {
        alert("Códigos incorretos! Tente novamente.");
    }
});
</script>

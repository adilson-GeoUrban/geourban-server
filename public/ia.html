<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeoUrban</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}

.card {
  background:#1e293b;
  padding:20px;
  margin:20px auto;
  width:300px;
  border-radius:10px;
}

button {
  margin:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:5px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="login" class="card">
<h2>🔐 GeoUrban</h2>

<button onclick="loginPadrao()">Entrar</button>

<input id="chave" placeholder="Chave soberana">
<button onclick="loginSoberano()">👑 Soberano</button>

<p id="msg"></p>
</div>

<div id="painel" class="card" style="display:none;">
<h2>🏢 Painel</h2>

<textarea id="ordem" placeholder="Digite ordem"></textarea>

<button onclick="executar()">Executar</button>
<button onclick="sala()">Sala Secreta</button>

<p id="resposta"></p>
</div>

<script>
let TOKEN = null;

function loginPadrao(){
  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ tipo:"padrao" })
  })
  .then(r=>r.json())
  .then(d=>{
    TOKEN = d.token;
    document.getElementById("login").style.display="none";
    document.getElementById("painel").style.display="block";
  });
}

function loginSoberano(){
  const chave = document.getElementById("chave").value;

  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ tipo:"soberano", chave })
  })
  .then(r=>r.json())
  .then(d=>{
    TOKEN = d.token;
    document.getElementById("login").style.display="none";
    document.getElementById("painel").style.display="block";
  });
}

function executar(){
  fetch("/executar",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-token": TOKEN
    },
    body: JSON.stringify({ ordem: document.getElementById("ordem").value })
  })
  .then(r=>r.text())
  .then(t=>document.getElementById("resposta").innerText=t);
}

function sala(){
  fetch("/sala-secreta",{
    headers:{ "x-token": TOKEN }
  })
  .then(r=>r.text())
  .then(t=>document.getElementById("resposta").innerText=t);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoUrban - Login Master</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1b5e20, #4caf50);
    color: white;
}
#login-flutuante {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    background-color: rgba(30,30,30,0.95);
    color: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    z-index: 1000;
}
#login-flutuante input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: none;
}
#login-flutuante button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
}
#entrar { background-color: #2e7d32; }
#confirmar { background-color: #1565c0; }
#verificacao { display: none; margin-top: 15px; }
a { color: #90caf9; font-size: 12px; text-decoration: none; }
</style>
</head>
<body>

<!-- Caixa Flutuante Login -->
<div id="login-flutuante">
    <h2 style="text-align:center; margin-bottom: 20px;">Login Master - GeoUrban</h2>
    
    <label for="usuario">Usuário / E-mail:</label>
    <input type="text" id="usuario">
    
    <label for="senha">Senha:</label>
    <input type="password" id="senha">
    
    <button id="entrar">Entrar</button>
    
    <div style="margin-top:15px; text-align:center;">
        <a href="#">Esqueci minha senha</a>
    </div>

    <!-- Dupla verificação -->
    <div id="verificacao">
        <label for="codigoEmail">Código E-mail:</label>
        <input type="text" id="codigoEmail">
        <label for="codigoSMS">Código SMS:</label>
        <input type="text" id="codigoSMS">
        <button id="confirmar">Confirmar</button>
    </div>
</div>

<script>
document.getElementById("entrar").addEventListener("click", function() {
    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;
    if(usuario === "admin" && senha === "1234") {
        alert("Senha correta! Agora confirme o código de email/SMS.");
        document.getElementById("verificacao").style.display = "block";
    } else {
        alert("Usuário ou senha incorretos!");
    }
});

document.getElementById("confirmar").addEventListener("click", function() {
    const codigoEmail = document.getElementById("codigoEmail").value;
    const codigoSMS = document.getElementById("codigoSMS").value;
    if(codigoEmail === "1111" && codigoSMS === "2222") {
        alert("Login master confirmado! Bem-vindo ao GeoUrban.");
        document.getElementById("login-flutuante").style.display = "none";
        // Aqui você pode chamar funções para abrir Calcenter / IA GeoUrban
    } else {
        alert("Códigos incorretos! Tente novamente.");
    }
});
</script>

</body>
</html>

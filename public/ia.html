async function goPanel() {
  try {

    const res = await fetch("/ia.html", {
      method: "HEAD",
      cache: "no-store"
    });

    if (res.ok) {
      window.location.replace("/ia.html");
    } else {
      window.location.replace("/");
    }

  } catch (e) {
    console.error("Erro ao acessar painel:", e);
    window.location.replace("/");
  }
}

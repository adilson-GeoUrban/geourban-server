<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA GeoUrban</title>

<style>
body {
    background: #0f0f0f;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

textarea {
    width: 90%;
    height: 120px;
    padding: 10px;
    border-radius: 10px;
}

button {
    margin-top: 15px;
    padding: 15px;
    width: 90%;
    background: #00e676;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.resultado {
    margin-top: 20px;
    background: #1e1e1e;
    padding: 20px;
    border-radius: 10px;
    text-align: left;
    white-space: pre-line;
}
</style>
</head>

<body>

<h1>🤖 IA GeoUrban</h1>

<textarea id="entrada" placeholder="Descreva seu projeto..."></textarea>

<button onclick="gerar()">Gerar Conteúdo</button>

<div id="saida" class="resultado"></div>

<h2>🧠 Monitor do Sistema</h2>
<div id="monitor" class="resultado"></div>

<script>

// 🔥 IA DESIGNER
function gerar() {
    const texto = document.getElementById("entrada").value.toLowerCase();
    let resposta = "";

    if (texto.includes("pdf")) {
        resposta = "📄 GERADOR DE PDF\n\n- Capa\n- Conteúdo\n- Conclusão";
    }
    else if (texto.includes("guia")) {
        resposta = "📘 GUIA\n\n1. Planejar\n2. Executar\n3. Validar";
    }
    else if (texto.includes("video")) {
        resposta = "🎥 ROTEIRO\n\n- Abertura\n- Conteúdo\n- Final";
    }
    else {
        resposta = "🤖 IA ativa\nSugestão: use PDF, guia ou vídeo";
    }

    document.getElementById("saida").innerText = resposta;
}

// 🔔 ALERTA
function alertaSistema(status) {
    if (status.includes("ERRO") || status.includes("OFFLINE")) {
        alert("⚠️ Sistema com problema!");
    }
}

// 🔄 ATUALIZA MONITOR
function atualizar(texto) {
    document.getElementById("monitor").innerText = texto;
    alertaSistema(texto);
}

// 🔍 VERIFICA SISTEMA
function verificarSistema() {
    let status = "";

    status += "🤖 IA: ATIVA\n";

    if (navigator.onLine) {
        status += "📡 Internet: ONLINE\n";
    } else {
        status += "📡 Internet: OFFLINE\n";
    }

    fetch("/")
        .then(() => {
            status += "🌐 Servidor: OK\n";
            status += "⚙️ Motor: OPERANDO\n";
            atualizar(status);
        })
        .catch(() => {
            status += "🌐 Servidor: ERRO\n";
            status += "⚙️ Motor: PARADO\n";
            atualizar(status);
        });
}

// 🔁 LOOP AUTOMÁTICO
setInterval(verificarSistema, 5000);

// 🚀 INICIAR
verificarSistema();

</script>

</body>
</html>

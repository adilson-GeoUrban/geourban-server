<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoUrban - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }
    
    .login-container h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }
    
    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .status {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
      min-height: 20px;
    }
    
    .status.error {
      color: #e74c3c;
    }
    
    .status.success {
      color: #27ae60;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>🌍 GeoUrban</h1>
    
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          placeholder="seu@email.com" 
          required
        >
      </div>
      
      <div class="form-group">
        <label for="password">Senha</label>
        <input 
          type="password" 
          id="password" 
          placeholder="••••••••" 
          required
        >
      </div>
      
      <button type="submit" class="login-btn">Entrar</button>
    </form>
    
    <div id="status" class="status"></div>
  </div>

  <script>
    async function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const statusEl = document.getElementById('status');
      
      statusEl.textContent = 'Conectando...';
      statusEl.className = 'status';
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('usuario', data.user.email);
          statusEl.textContent = 'Login realizado com sucesso!';
          statusEl.className = 'status success';
          
          // Redirecionar para dashboard após 1 segundo
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1000);
        } else {
          statusEl.textContent = data.message || 'Erro ao fazer login';
          statusEl.className = 'status error';
        }
      } catch (error) {
        statusEl.textContent = 'Erro ao conectar com o servidor';
        statusEl.className = 'status error';
        console.error('Erro:', error);
      }
    }
  </script>
</body>
</html>

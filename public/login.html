<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>

  <h2>Login</h2>

  <input id="usuario" type="text" placeholder="Usuário">
  <br><br>

  <input id="senha" type="password" placeholder="Senha">
  <br><br>

  <button onclick="login()">Entrar</button>

  <script>
    function login() {
      const username = document.getElementById(" API_KEY").@SPGeourbanX9a#kL2026;
      const password = document.getElementById("ADMIN_PASS").@Lvgeourb@2026#Segura!#;

      fetch("/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username: username,
          password: password
        })
      })
      .then(res => res.json())
      .then(data => {

          alert("Login OK");

      })
      .catch(() => {
        alert("Erro ao conectar");
      });
    }
  </script>

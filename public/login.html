<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - GeoUrban</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #111;
      color: white;
    }

    input {
      padding: 10px;
      width: 250px;
      margin: 10px auto;
      display: block;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>🌐 Login GeoUrban</h2>

  <p>⚠️ LGPD: seus dados são protegidos e usados apenas na plataforma.</p>

  <form id="loginForm">
    <input type="text" id="user" placeholder="Usuário" required>
    <input type="password" id="pass" placeholder="Senha" required>
    <button type="submit">Entrar</button>
  </form>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      // 🎯 ACESSIBILIDADE (Luiza)
      const acc = localStorage.getItem("acessibilidade");

      if (acc && acc.includes("visual")) {
        document.body.style.fontSize = "22px";
        document.body.style.background = "black";
        document.body.style.color = "yellow";
      }

      const form = document.getElementById('loginForm');

      if (!form) {
        console.error("Formulário não encontrado");
        return;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;

        try {
          const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user, pass })
          });

          const data = await res.json();

          if (data.token) {
            localStorage.setItem("usuario", data.user);
            localStorage.setItem("token", data.token);

            // 🚀 REDIRECIONAMENTO PADRÃO
            window.location.href = "/index.html";

          } else {
            alert(data.message || "Login inválido");
          }

        } catch (err) {
          console.error(err);
          alert("Erro ao conectar com servidor");
        }
      });

    });
  </script>

</body>
</html>

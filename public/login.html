<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - GeoUrban</title>
</head>

<body>

  <h2>Login GeoUrban</h2>

  <form id="loginForm">
    <input type="text" id="user" placeholder="Usuário" required><br><br>
    <input type="password" id="pass" placeholder="Senha" required><br><br>
    <button type="submit">Entrar</button>
  </form>

  <script>
    // 🎯 acessibilidade automática
    const acc = localStorage.getItem("acessibilidade");

    if (acc && acc.includes("visual")) {
      document.body.style.fontSize = "22px";
      document.body.style.background = "black";
      document.body.style.color = "yellow";
    }

    const form = document.getElementById('loginForm');

    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;

        try {
          const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user, pass })
          });

          const data = await res.json();

          if (data.token) {
            localStorage.setItem("usuario", data.user);
            localStorage.setItem("token", data.token);

            // 🔁 redireciona corretamente (mesma aba)
            window.location.href = "index.html";
          } else {
            alert(data.message || "Login inválido");
          }

        } catch (err) {
          alert("Erro ao conectar com servidor");
        }
      });
    }
  </script>

</body>
</html>

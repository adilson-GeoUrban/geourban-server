<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GeoUrban Login</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #222;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #00ff88;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>GeoUrban</h2>

  <input type="text" id="email" placeholder="Digite qualquer email">
  <button onclick="login()">Entrar</button>

  <p id="status"></p>
</div>

<script>
function login() {
  const email = document.getElementById('email').value;

  fetch('https://geourban-server-production.up.railway.app/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ email })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById('status').innerText =
      '✅ Logado como: ' + data.user.nome;

    console.log(data);
  })
  .catch(err => {
    document.getElementById('status').innerText =
      '❌ Erro ao conectar servidor';
  });
}
</script>

</body>
</html>

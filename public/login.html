<!-- ================= 🟨 FRONTEND LOGIN ================= -->
<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input id="usuario" placeholder="Usuário"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>

<button onclick="logar()">Entrar</button>

<script>
async function logar() {
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      usuario: usuario.value,
      senha: senha.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    window.location.href = "/admin.html";
  } else {
    alert("Erro login");
  }
}
</script>

</body>
 <!-- ================= 🟨 PAINEL ADMIN ================= -->
<!DOCTYPE html>
<html>
<head>
  <title>Painel</title>

  <style>
    body {
      background: url("/bg.jpg") no-repeat center center fixed;
      background-size: cover;
      color: white;
    }
  </style>
</head>
<body>

<h2>Painel Admin</h2>

<button onclick="teste()">Testar API</button>
<button onclick="auditoria()">Auditoria</button>
<button onclick="backup()">Backup</button>
<button onclick="ia()">IA Designer</button>

<pre id="saida"></pre>

<script>
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/login.html";
}

async function api(url) {
  const res = await fetch(url, {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();
  document.getElementById("saida").innerText =
    JSON.stringify(data, null, 2);
}

function teste(){ api("/api/teste"); }
function auditoria(){ api("/admin/auditoria"); }
function backup(){ api("/admin/backup"); }
function ia(){ api("/ia/designer"); }
</script>

</body>
</html>
</html>

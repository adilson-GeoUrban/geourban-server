<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GeoUrban</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    /* 🔵 FUNDO COM IMAGEM */
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* 🔵 CAIXA FLUTUANTE */
#lgpd-box {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    background: rgba(0,0,0,0.75);
    color: white;

    padding: 25px;
    border-radius: 12px;
    text-align: center;

    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    animation: aparecer 0.5s ease;
}

/* BOTÃO */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #4caf50;
    color: white;
    cursor: pointer;
}

/* ANIMAÇÃO */
@keyframes aparecer {
    from {
        opacity: 0;
        transform: translate(-50%, -40%);
    }
    to {
        opacity: 1;
        transform: translate(-50%, -50%);
    }
}
</style>
</head>

<body>

<!-- 🔵 LGPD -->
<div id="lgpd-box">
    <div>🤖 IA Luiza</div>
    <p>⚠️ LGPD: seus dados são protegidos e usados apenas na plataforma.</p>
    <button onclick="aceitar()">Aceito e continuar</button>
</div>

<script>
function aceitar() {
    localStorage.setItem("lgpd", "ok");

    // 🔵 abre login em nova aba segura
    window.open("/login", "_blank", "noopener,noreferrer");

    // 🔵 esconde caixa
    document.getElementById("lgpd-box").style.display = "none";
}
</script>

</body>
</html>

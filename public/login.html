<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login GeoUrban</title>

<style>
body{
 background:#111;
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 font-family:Arial;
}

#box{
 background:#222;
 padding:30px;
 border-radius:10px;
 box-shadow:0 0 10px black;
}

input{
 display:block;
 margin:10px 0;
 padding:10px;
 width:250px;
}

button{
 padding:10px;
 width:100%;
 background:#4CAF50;
 color:white;
 border:none;
 cursor:pointer;
}
</style>
</head>

<body>

<div id="box">
<h2>Login</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p id="msg"></p>
</div>

<script>
function login(){

 fetch("/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    usuario:document.getElementById("user").value,
    senha:document.getElementById("pass").value
  })
 })
 .then(r=>r.json())
 .then(res=>{
   if(res.ok){
     window.location = "/";
   }else{
     document.getElementById("msg").innerText = "Login inválido";
   }
 });
}
</script>

</body>
</html>

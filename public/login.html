<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GeoUrban | Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:url("/bg.jpg") center center no-repeat;
background-size:cover;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

body::before{

content:"";

position:absolute;

inset:0;

background:rgba(0,0,0,.60);

}

.login{

position:relative;

width:420px;

background:rgba(20,20,20,.90);

padding:40px;

border-radius:15px;

border:2px solid #FFD000;

box-shadow:0 0 40px rgba(0,0,0,.60);

z-index:1;

}

.logo{

text-align:center;

font-size:34px;

color:#FFD000;

font-weight:bold;

margin-bottom:10px;

}

.subtitulo{

text-align:center;

color:#fff;

margin-bottom:35px;

}

label{

display:block;

margin-bottom:6px;

color:#FFD000;

}

input{

width:100%;

padding:12px;

margin-bottom:20px;

border:none;

border-radius:8px;

font-size:15px;

}

button{

width:100%;

padding:14px;

background:#FFD000;

color:#000;

border:none;

border-radius:8px;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#ffe45c;

}

#mensagem{

margin-top:20px;

text-align:center;

font-weight:bold;

color:#FFD000;

}

footer{

margin-top:30px;

text-align:center;

font-size:12px;

color:#999;

}

</style>

</head>

<body>

<div class="login">

<div class="logo">

GeoUrban

</div>

<div class="subtitulo">

Plataforma Inteligente de Gestão Territorial

</div>

<label>E-mail</label>

<input
type="email"
id="email"
placeholder="Digite seu e-mail">

<label>Senha</label>

<input
type="password"
id="senha"
placeholder="Digite sua senha">

<button onclick="entrar()">

ENTRAR

</button>

<div id="mensagem"></div>

<footer>

© GeoUrban Intelligence

</footer>

</div>

<script>

async function entrar(){

const email=document.getElementById("email").value;

const senha=document.getElementById("senha").value;

const msg=document.getElementById("mensagem");

msg.innerHTML="Verificando...";

try{

const resposta=await fetch("/api/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email,

senha

})

});

const dados=await resposta.json();

if(resposta.ok){

msg.style.color="#00ff66";

msg.innerHTML="Login realizado.";

setTimeout(()=>{

window.location="/dashboard";

},800);

}
else{

msg.style.color="#ff5555";

msg.innerHTML=dados.message;

}

}catch(e){

msg.style.color="#ff5555";

msg.innerHTML="Erro ao conectar ao servidor.";

}

}

</script>

</body>
</html>

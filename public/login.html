<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>

<body>

<h2>Login</h2>

<form id="loginForm">
  <input type="text" id="user" placeholder="Usuário" required><br><br>
  <input type="password" id="pass" placeholder="Senha" required><br><br>
  <button type="submit">Entrar</button>
</form>

<script>
  // 🎯 acessibilidade automática
  const acc = localStorage.getItem("acessibilidade");

  if (acc && acc.includes("visual")) {
    document.body.style.fontSize = "22px";
    document.body.style.background = "black";
    document.body.style.color = "yellow";
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;

    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, pass })
    });

    const data = await res.json();
    alert(data.message);
  });
</script>

</body>
</html>

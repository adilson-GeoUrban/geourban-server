```yaml
name: GeoUrban Auditoria 360

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  auditoria:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Testar controlador
        run: |
          echo "======================================"
          echo "GEOURBAN CONTROLADOR"
          echo "AUDITORIA 360"
          echo "MODO SOMENTE LEITURA"
          echo "======================================"
          echo "Commit:"
          git rev-parse HEAD
          echo "Branch:"
          git branch --show-current
          echo "Data:"
          date

      - name: Verificar arquivos
        run: |
          echo "Arquivos principais:"
          [ -f server.js ] && echo "OK - server.js" || echo "AUSENTE - server.js"
          [ -f package.json ] && echo "OK - package.json" || echo "AUSENTE - package.json"
          [ -d public ] && echo "OK - public" || echo "AUSENTE - public"
          [ -d .github/workflows ] && echo "OK - workflows" || echo "AUSENTE - workflows"

      - name: Criar relatorio
        run: |
          mkdir -p auditoria-geourban

          echo "GEOURBAN AUDITORIA 360" > auditoria-geourban/relatorio.txt
          echo "" >> auditoria-geourban/relatorio.txt
          echo "Commit:" >> auditoria-geourban/relatorio.txt
          git rev-parse HEAD >> auditoria-geourban/relatorio.txt
          echo "" >> auditoria-geourban/relatorio.txt
          echo "Arquivos:" >> auditoria-geourban/relatorio.txt
          find . -maxdepth 3 -type f -not -path "./.git/*" | sort >> auditoria-geourban/relatorio.txt

          cat auditoria-geourban/relatorio.txt

      - name: Salvar relatorio
        uses: actions/upload-artifact@v4
        with:
          name: GeoUrban-Auditoria-360
          path: auditoria-geourban

      - name: Finalizar
        run: |
          echo "======================================"
          echo "AUDITORIA CONCLUIDA"
          echo "NENHUMA ALTERACAO REALIZADA"
          echo "NENHUM DEPLOY REALIZADO"
          echo "======================================"
```

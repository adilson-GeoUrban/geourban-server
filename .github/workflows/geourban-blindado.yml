name: GeoUrban Robô Blindado - Auditoria Frontend

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  auditoria-frontend:
    runs-on: ubuntu-latest

    steps:

      - name: Baixar código GeoUrban
        uses: actions/checkout@v4

      - name: Iniciar Auditoria
        run: |
          echo "================================="
          echo "🛡️ ROBÔ BLINDADO GEOURBAN"
          echo "MISSÃO 01 - AUDITORIA FRONTEND"
          echo "================================="

      - name: Verificar arquivos críticos
        run: |
          echo "Analisando arquivos..."

          for arquivo in \
            public/app.js \
            public/ia.html \
            public/login.html \
            public/dashboard.html \
            server.js \
            package.json
          do
            if [ -f "$arquivo" ]; then
              echo "✅ Encontrado: $arquivo"
            else
              echo "❌ Não encontrado: $arquivo"
            fi
          done

      - name: Procurar código legado JWT
        run: |
          echo "Analisando possíveis restos de autenticação antiga..."

          grep -n "token" public/app.js || true
          grep -n "localStorage" public/app.js || true
          grep -n "jsonwebtoken" server.js || true
          grep -n "jwt" server.js || true

      - name: Verificar compatibilidade API
        run: |
          echo "Comparando chamadas de login..."

          grep -n "/api/login" public/login.html || true
          grep -n "/login" public/app.js || true
          grep -n "POST" server.js || true

      - name: Gerar relatório final
        run: |
          echo "================================="
          echo "RELATÓRIO FINAL"
          echo "================================="
          echo "Auditoria concluída."
          echo "Nenhuma alteração realizada."
          echo "Modo somente leitura ativo."
          echo "Aguardando autorização."


<script>
let token = "";

// 🔐 LOGIN REAL COM TOKEN
async function login(){
    const res = await fetch("http://localhost:3000/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({user:"admin", pass:"1234"})
    });

    const data = await res.json();

    if(res.ok){
        token = data.token;
        tela.innerHTML = "🔐 Login OK (token recebido)";
    } else {
        tela.innerHTML = "❌ Erro login";
    }
}

// 🤖 IA (simples)
function ia(){
    let tema = prompt("Tema:");
    tela.innerHTML = "📘 Aula sobre " + tema;
}

// 📊 LOGS PROTEGIDO COM TOKEN
async function logs(){
    const res = await fetch("http://localhost:3000/logs",{
        headers:{
            "Authorization": token
        }
    });

    if(!res.ok){
        tela.innerHTML = "🚫 Acesso negado (sem token)";
        return;
    }

    const data = await res.json();

    let html = "<h3>📊 Logs</h3>";
    data.forEach(l => {
        html += "<p>" + l.tipo + " - " + l.msg + "</p>";
    });

    tela.innerHTML = html;
}
</script>

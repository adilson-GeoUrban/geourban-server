<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GeoUrban Control</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0f1a;
    color:#00ffcc;
}

.topo {
    background:#111;
    padding:15px;
    text-align:center;
    font-size:20px;
}

.painel {
    display:flex;
}

.menu {
    width:200px;
    background:#111;
    height:100vh;
    padding:10px;
}

.menu button {
    width:100%;
    margin:5px 0;
    padding:10px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
}

.conteudo {
    flex:1;
    padding:20px;
}

.monitor {
    width:250px;
    background:#111;
    padding:10px;
    font-size:12px;
}

.box {
    border:1px solid #00ffcc;
    padding:10px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="topo">🚀 GEOURBAN CONTROLE TOTAL</div>

<div class="painel">

<div class="menu">
<button onclick="login()">Login</button>
<button onclick="verLogs()">Logs</button>
<button onclick="verIntel()">Inteligência</button>
</div>

<div class="conteudo" id="conteudo">
Sistema pronto
</div>

<div class="monitor">
<div class="box" id="sessao"></div>
<div class="box" id="status"></div>
<div class="box" id="risco"></div>
</div>

</div>

<script>
let token = "";
let risco = 0;

// 👁️ MONITOR
setInterval(()=>{
    document.getElementById("sessao").innerText = "Sessão ativa";
    document.getElementById("status").innerText = "Status: ONLINE";
    document.getElementById("risco").innerText = "Risco: " + risco;
},1000);

// 🔐 LOGIN
async function login(){
    const res = await fetch("http://localhost:3000/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({user:"admin", pass:"1234"})
    });

    const data = await res.json();

    if(res.ok){
        token = data.token;
        conteudo.innerHTML = "🔐 Login OK";
    } else {
        conteudo.innerHTML = "❌ Falha login";
    }
}

// 📊 LOGS
async function verLogs(){
    const res = await fetch("http://localhost:3000/logs",{
        headers:{Authorization: token}
    });

    if(!res.ok){
        conteudo.innerHTML = "🚫 Sem acesso";
        return;
    }

    const data = await res.json();

    let html = "<h3>Logs</h3>";
    data.forEach(l=>{
        html += "<p>"+l.tipo+" | "+l.msg+"</p>";
    });

    conteudo.innerHTML = html;
}

// 🧠 INTEL
async function verIntel(){
    const res = await fetch("http://localhost:3000/intel",{
        headers:{Authorization: token}
    });

    if(!res.ok){
        conteudo.innerHTML = "🚫 Sem acesso";
        return;
    }

    const data = await res.json();

    let html = "<h3>Inteligência</h3>";
    for(let ip in data){
        html += "<p>"+ip+" | risco: "+data[ip].risco+"</p>";
        risco = data[ip].risco;
    }

    conteudo.innerHTML = html;
}
</script>

</body>
</html>
